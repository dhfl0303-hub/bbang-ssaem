<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>완제품수불부</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--primary:#1a5fa8;--primary-light:#e8f0fb;--primary-dark:#0d3f75;--success:#1e9e6e;--success-light:#e6f5ef;--warning:#e07b1a;--warning-light:#fdf0e0;--danger:#d63031;--danger-light:#fff0f0;--border:#e0e4ea;--bg:#f4f6fa;--text:#1a1d23;--text2:#5a6070;--text3:#9aa0ad;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);}
.topbar{background:var(--primary-dark);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{color:#fff;font-size:16px;font-weight:700;}
.topbar-back{color:rgba(255,255,255,0.8);background:none;border:none;font-size:13px;cursor:pointer;}
.content{padding:20px;max-width:1400px;margin:0 auto;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:15px;font-weight:700;}
.card-bd{padding:20px;}
.filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.search-input{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:"Noto Sans KR",sans-serif;outline:none;min-width:160px;}
.search-input:focus{border-color:var(--primary);}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;cursor:pointer;font-family:"Noto Sans KR",sans-serif;font-weight:600;padding:8px 16px;font-size:13px;transition:all 0.15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fcc;}
.btn-sm{padding:5px 10px;font-size:12px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.stat-value{font-size:26px;font-weight:700;}
.stat-blue{color:var(--primary);}
.stat-green{color:var(--success);}
.stat-red{color:var(--danger);}
.table-wrap{overflow-x:auto;}
table{width:100%;min-width:600px;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg);}
th{padding:10px 12px;text-align:left;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:var(--primary-light);color:var(--primary);}
.badge-green{background:var(--success-light);color:var(--success);}
.badge-gray{background:#f0f0f0;color:#666;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);}
.modal-bd{padding:24px;}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-row{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:"Noto Sans KR",sans-serif;outline:none;width:100%;}
.form-input:focus{border-color:var(--primary);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fl-tab{padding:8px;border:none;border-radius:7px;font-family:"Noto Sans KR",sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.15s;}
.fl-tab.active{background:var(--primary);color:#fff;}
.fl-panel{display:none;}
.fl-panel.active{display:block;}
.tc{text-align:center;}</style>
</head>
<body>
<div class="topbar">
  <button class="topbar-back" onclick="location.href='통합관리.html'">← 통합관리</button>
  <div class="topbar-title">📦 완제품수불부</div>
  <div style="display:flex;gap:8px;align-items:center;">

</div>
<div class="content">

    <button class="fl-tab" id="fl-tab-stock" onclick="switchFlTab('stock')" style="flex:1;">📊 완제품수불부</button>
    <button class="fl-tab" id="fl-tab-manage" onclick="switchFlTab('manage')" style="flex:1;">⚙️ 관리</button>
  </div>

  <div class="fl-panel active" id="fl-panel-outbound">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="card">
        <div class="card-hd"><div class="card-hd-title">🚚 출고 등록</div></div>
        <div class="card-bd">
          <div class="form-row"><label class="form-label">그룹LOT 선택</label><select class="form-input" id="fl-ob-group" onchange="flOnGroupSelected()"><option value="">-- 선택 --</option></select></div>
          <div id="fl-ob-info" style="display:none;background:var(--bg);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;">

        </div>
      </div>
      <div class="card">

        </div>

  <div class="fl-panel" id="fl-panel-manage">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <div class="card"><div class="card-hd"><div class="card-hd-title">🏷 제품 관리</div></div><div class="card-bd"><div class="form-grid"><div class="form-row"><label class="form-label">LOT코드</label><input class="form-input" id="fl-pm-lot-code" placeholder="예: E11"></div><div class="form-row"><label class="form-label">거래처</label><input class="form-input" id="fl-pm-client" placeholder="거래처명"></div><div class="form-row"><label class="form-label">제품명</label><input class="form-input" id="fl-pm-name" placeholder="제품명"></div><div class="form-row"><label class="form-label">규격</label><input class="form-input" id="fl-pm-spec" placeholder="예: 65g*24ea/box"></div><div class="form-row"><label class="form-label">파렛트당 박스</label><input class="form-input" id="fl-pm-pallet" type="number" placeholder="0"></div></div><button class="btn btn-primary btn-sm" style="width:100%;margin-top:8px;" onclick="flAddProduct()">+ 제품 추가</button></div></div>

        <div class="card"><div class="card-hd"><div class="card-hd-title">⚙ 데이터 관리</div></div><div class="card-bd" style="display:flex;flex-direction:column;gap:8px;"><button class="btn btn-primary btn-sm" style="width:100%" onclick="flSyncFromPack()">🔄 포장 데이터 동기화</button><button class="btn btn-outline btn-sm" style="width:100%" onclick="flClearDeletedLots()">♻️ 삭제이력 초기화 후 재동기화</button><button class="btn btn-danger btn-sm" style="width:100%" onclick="flResetData()">🗑 전체 데이터 초기화</button></div></div>
      </div>
    </div>
  </div>
</div>

</div>

<script>

function getTodayISO2(){ return new Date().toISOString().slice(0,10); }
function fmtObDate(input){
  const v=input.value.replace(/\D/g,'').slice(0,6);
  if(v.length===6){
    input.value=`${v.slice(0,2)}.${v.slice(2,4)}.${v.slice(4,6)}`;
    input.dataset.raw=v;
    input.style.color='var(--primary)'; input.style.fontWeight='700';
  } else {
    input.dataset.raw='';
    input.style.color=''; input.style.fontWeight='';
    input.value=v;
  }
}
function getObDateVal(){
  const el=document.getElementById('fl-ob-date');
  return el ? (el.dataset.raw||el.value.replace(/\./g,'')||'') : '';
}
function getToday(){ const d=new Date(); return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일'; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e,id){ if(e.target.id===id) closeModal(id); }
function closeAllModals(){ document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); }

// ===== Firebase 직접 읽기/쓰기 =====
async function loadFromFirebase(){
  if(!window._db) return;
  try{
    const [lotsSnap, prodSnap, clientSnap, delSnap, lotMapSnap] = await Promise.all([
      window._db.collection('appData').doc('완제품_lots').get(),
      window._db.collection('appData').doc('완제품_products').get(),
      window._db.collection('appData').doc('완제품_clients').get(),
      window._db.collection('appData').doc('완제품_deleted_lots').get(),
      window._db.collection('appData').doc('lotMapping').get()
    ]);
    if(lotsSnap.exists && lotsSnap.data().data) window._flLots = JSON.parse(lotsSnap.data().data);
    if(prodSnap.exists && prodSnap.data().data) window._flProducts = JSON.parse(prodSnap.data().data);
    if(clientSnap.exists && clientSnap.data().data) window._flClients = JSON.parse(clientSnap.data().data);
    if(delSnap.exists && delSnap.data().data) window._deletedLots = JSON.parse(delSnap.data().data);
    if(lotMapSnap.exists && lotMapSnap.data().data) window._lotMapping = JSON.parse(lotMapSnap.data().data);
    // packRecords 전체 로드
    window._fbPackCache = {};
    const allSnap = await window._db.collection('appData').get();
    allSnap.forEach(doc=>{ if(doc.id.startsWith('packRecords_')&&doc.data().data) window._fbPackCache[doc.id]=JSON.parse(doc.data().data); });
  }catch(e){ console.warn('Firebase 로드 실패',e); }
}
function flLoad(){
  FL_STATE.lots=window._flLots||[];
  FL_STATE.products=window._flProducts||FL_DEFAULT_PRODUCTS;
  FL_STATE.clients=window._flClients||FL_DEFAULT_CLIENTS;
}function flGroupKey(lotNum){const p=lotNum.split('-');return p.length>=2?`${p[0]}-${p[1]}`:lotNum;}

// 삭제된 pkg_lot 목록 관리
function flGetDeletedLots(){ return window._deletedLots||[]; }
function flAddDeletedLot(pkgLot){
  const deleted = flGetDeletedLots();
  if(!deleted.includes(pkgLot)){
    deleted.push(pkgLot);
    window._deletedLots=deleted;
    if(window._db) window._db.collection('appData').doc('완제품_deleted_lots').set({data:JSON.stringify(deleted),updatedAt:new Date().toISOString()}).catch(e=>console.warn(e));
  }
}
function flGetGroups(hideZero=false,clientFilter='전체',groupFilter='전체'){
  const map={},order=[];
  for(const l of FL_STATE.lots){
    const gk=flGroupKey(l.lot_number);
    if(!map[gk]){map[gk]={key:gk,client:l.client,name:l.name,mfg_date:l.mfg_date,exp_date:l.exp_date,lots:[],total_box:0,remain_box:0,total_out:0};order.push(gk);}
    const g=map[gk];g.lots.push(l);g.total_box+=l.total_box;g.remain_box+=l.remain_box;g.total_out+=l.outbound.reduce((s,o)=>s+o.box,0);
  }
  let res=order.map(k=>map[k]);
  if(clientFilter!=='전체') res=res.filter(g=>g.client===clientFilter);
  if(groupFilter!=='전체') res=res.filter(g=>g.key===groupFilter);
  if(hideZero) res=res.filter(g=>g.remain_box>0);
  return res;
}
function flFmtDate6(d6){if(!d6||d6.length!==6)return d6||'-';return `20${d6.slice(0,2)}.${d6.slice(2,4)}.${d6.slice(4,6)}`;}
function flSyncFromPack(silent=false){
  const keys=Object.keys(window._fbPackCache||{});
  const lotMapping=window._lotMapping||[];
  const deletedLots=flGetDeletedLots();
  let count=0, updated=0;
  keys.forEach(k=>{
    const recs=(window._fbPackCache&&window._fbPackCache[k])||[];
    recs.forEach(r=>{
      if(!r.lot||!r.productCode) return;

      const mappingEntry=lotMapping.find(m=>m.pLot===r.productCode);
      // deletedLots에 있어도 매핑이 있으면 재동기화 허용
      if(deletedLots.includes(r.lot)){
        if(!mappingEntry) return;
        const idx=deletedLots.indexOf(r.lot);
        if(idx>=0){ deletedLots.splice(idx,1); window._deletedLots=deletedLots; if(window._db) window._db.collection('appData').doc('완제품_deleted_lots').set({data:JSON.stringify(deletedLots),updatedAt:new Date().toISOString()}).catch(e=>console.warn(e)); }
      }
      const wLotCode=mappingEntry&&mappingEntry.wLots.length ? mappingEntry.wLots[0].lot : r.productCode;
      const wLotName=mappingEntry&&mappingEntry.wLots.length ? mappingEntry.wLots[0].name : (r.product||'');
      const wLotClient=mappingEntry&&mappingEntry.wLots.length ? mappingEntry.wLots[0].client : '';
      const prod=FL_STATE.products.find(p=>p.lot_code===wLotCode);

      const existing=FL_STATE.lots.find(l=>l.pkg_lot===r.lot);
      if(existing){
        // 매핑 변경됐으면 업데이트
        if(existing.lot_code_base!==wLotCode){
          const mfg=existing.mfg_date||r.date||'';
          const existCount=FL_STATE.lots.filter(l=>l.pkg_lot!==r.lot&&l.lot_code_base===wLotCode&&l.mfg_date===mfg).length;
          existing.lot_number=`${wLotCode}-${mfg}-${String(existCount+1).padStart(2,'0')}`;
          existing.lot_code_base=wLotCode;
          existing.name=wLotName;
          existing.client=wLotClient;
          existing.spec=prod?.spec||existing.spec||'';
          updated++;
        }
        return;
      }

      const mfg=r.date||'';
      const existCount=FL_STATE.lots.filter(l=>l.lot_code_base===wLotCode&&l.mfg_date===mfg).length;
      const lotNum=`${wLotCode}-${mfg}-${String(existCount+1).padStart(2,'0')}`;
      FL_STATE.lots.push({
        lot_number:lotNum, lot_code_base:wLotCode,
        client:wLotClient, name:wLotName,
        spec:prod?.spec||'', mfg_date:mfg,
        exp_date:r.expiryDate||'',
        total_box:parseInt(r.qtyBoxes)||0,
        remain_box:parseInt(r.qtyBoxes)||0,
        is_partial:false, pkg_lot:r.lot,
        outbound:[], reg_date:r.date||getTodayISO2()
      });
      count++;
    });
  });
  flSave();
  if(!silent){
    let msg=`동기화 완료: ${count}건 추가`;
    if(updated) msg+=`, ${updated}건 매핑 업데이트`;
    alert(msg);
  }
  flRenderStock();flRefreshOutboundCombos();
}

function flRegisterOutbound(){
  const gk=document.getElementById('fl-ob-group').value;
  if(!gk){alert('그룹LOT를 선택해주세요');return;}
  const client=document.getElementById('fl-ob-client').value;
  if(!client){alert('출고처를 선택해주세요');return;}
  const date=getObDateVal();
  if(!date||date.length!==6){alert('출고일을 입력해주세요 (예: 260601)');return;}
  const boxes=parseInt(document.getElementById('fl-ob-boxes').value)||0;
  if(!boxes){alert('출고 박스수를 입력해주세요');return;}
  const g=flGetGroups().find(x=>x.key===gk);
  if(!g){alert('그룹을 찾을 수 없습니다');return;}
  if(boxes>g.remain_box){alert(`잔량(${g.remain_box}box)보다 많습니다`);return;}
  let toDeduct=boxes;
  const lots=FL_STATE.lots.filter(l=>flGroupKey(l.lot_number)===gk&&l.remain_box>0);
  for(const l of lots){if(toDeduct<=0)break;const deduct=Math.min(toDeduct,l.remain_box);l.outbound.push({box:deduct,client,date});l.remain_box-=deduct;toDeduct-=deduct;}
  flSave();flRefreshOutboundCombos();flRenderOutbound();flRenderStock();
  alert(`출고 등록 완료! ${boxes}box`);
  document.getElementById('fl-ob-boxes').value='';
}
function flRenderOutbound(){
  const groups=flGetGroups().filter(g=>g.total_out>0).reverse();
  const tbody=document.getElementById('fl-outbound-tbody');
  if(!tbody) return;
  if(!groups.length){tbody.innerHTML='<tr><td colspan="6" class="tc" style="padding:24px;color:var(--text3)">출고 내역이 없습니다</td></tr>';return;}
  let html='';
  for(const g of groups){
    const outbounds=[];
    for(const l of g.lots) for(let oi=0;oi<l.outbound.length;oi++) outbounds.push({...l.outbound[oi],lotNumber:l.lot_number,oi});
    outbounds.forEach(o=>{html+=`<tr>
      <td style="font-size:11px;color:var(--primary);font-weight:700">${g.key}</td>
      <td style="font-weight:600">${g.name}</td>
      <td style="font-size:12px">${o.client}</td>
      <td style="font-size:12px">${o.date}</td>
      <td class="tc" style="font-weight:700;color:var(--danger)">${o.box.toLocaleString()}</td>
      <td class="tc"><button class="btn btn-sm btn-danger" onclick="flDeleteOutbound('${o.lotNumber}',${o.oi})">삭제</button></td>
    </tr>`;});
  }
  tbody.innerHTML=html;
}
function flDeleteOutbound(lotNumber, oi){
  if(!confirm('이 출고 내역을 삭제하시겠습니까?\n삭제 시 재고가 복원됩니다.')) return;
  const lot = FL_STATE.lots.find(l=>l.lot_number===lotNumber);
  if(!lot) return;
  const ob = lot.outbound[oi];
  if(!ob) return;
  lot.remain_box += ob.box;
  lot.outbound.splice(oi, 1);
  flSave(); flRefreshOutboundCombos(); flRenderOutbound(); flRenderStock();
}
function fmtStockDate(input){
  const v=input.value.replace(/\D/g,'').slice(0,6);
  input.value=v;
  if(v.length===6){ input.style.color='var(--primary)'; input.style.fontWeight='700'; }
  else{ input.style.color=''; input.style.fontWeight=''; }
  flRenderStock();
}
function getStockDateISO(){
  const v=(document.getElementById('fl-st-date')?.value||'').replace(/\D/g,'');
  return yymmddToISO2(v);
}
function yymmddToISO2(v){
  if(!v||v.length!==6) return getTodayISO2();
  return '20'+v.slice(0,2)+'-'+v.slice(2,4)+'-'+v.slice(4,6);
}
function flRenderStock(){
  const selDate=getStockDateISO();
  const q=(document.getElementById('fl-st-search')?.value||'').trim().toLowerCase();
  const hideZero=document.getElementById('fl-st-hide-zero')?.checked||false;
  document.getElementById('fl-st-date-display').textContent=selDate;

  // 제품 마스터 기준 (FL_STATE.products)
  let products=FL_STATE.products.slice();
  if(q) products=products.filter(p=>p.name.toLowerCase().includes(q)||p.lot_code.toLowerCase().includes(q));

  const tbody=document.getElementById('fl-stock-tbody');
  if(!tbody) return;
  if(!products.length){tbody.innerHTML='<tr><td colspan="8" class="tc" style="padding:24px;color:var(--text3)">검색 결과가 없습니다</td></tr>';return;}

  let html='';
  products.forEach((prod,idx)=>{
    // 이 제품코드에 해당하는 lot들 찾기
    const lots=FL_STATE.lots.filter(l=>l.lot_code_base===prod.lot_code);
    const isOH=(l)=>l.lot_number&&l.lot_number.includes('-OH-');

    // OH(초기재고)는 날짜 무관 항상 포함
    const initStock=lots.filter(isOH).reduce((s,l)=>s+l.total_box,0);
    const initOut=lots.filter(isOH).reduce((s,l)=>s+l.outbound.reduce((ss,o)=>ss+o.box,0),0);

    // 전일재고: init(날짜무관) + selDate 이전 입고 - selDate 이전 출고
    let prevIn=0, prevOut=0;
    lots.filter(l=>!isOH(l)).forEach(l=>{
      const mfgISO=yymmddToISO2(l.mfg_date);
      if(mfgISO<selDate) prevIn+=l.total_box;
      l.outbound.forEach(o=>{
        const oISO=yymmddToISO2(o.date);
        if(oISO<selDate) prevOut+=o.box;
      });
    });
    // OH 출고도 날짜별로 분리
    let initPrevOut=0, initTodayOut=0;
    lots.filter(isOH).forEach(l=>{
      l.outbound.forEach(o=>{
        const oISO=yymmddToISO2(o.date);
        if(oISO<selDate) initPrevOut+=o.box;
        else if(oISO===selDate) initTodayOut+=o.box;
      });
    });
    const prevStock=Math.max(0, initStock - initPrevOut + prevIn - prevOut);

    // 당일 입고(완제품) - OH 제외
    let todayIn=0;
    lots.filter(l=>!isOH(l)).forEach(l=>{
      const mfgISO=yymmddToISO2(l.mfg_date);
      if(mfgISO===selDate) todayIn+=l.total_box;
    });

    // 당일 출고 - OH 출고 포함
    let todayOut=initTodayOut;
    lots.filter(l=>!isOH(l)).forEach(l=>{
      l.outbound.forEach(o=>{
        const oISO=yymmddToISO2(o.date);
        if(oISO===selDate) todayOut+=o.box;
      });
    });

    const closing=Math.max(0,prevStock+todayIn-todayOut);

    // 재고있는것만 필터
    if(hideZero && closing===0) return;

    const exp=FL_STATE.expandedStock.has(prod.lot_code);

    html+=`<tr style="cursor:pointer;" onclick="flToggleStock('${prod.lot_code}')">
      <td>${lots.length>0?(exp?'▼':'▶'):''}</td>
      <td><span class="badge badge-blue" style="font-size:10px">${prod.lot_code}</span></td>
      <td style="font-weight:600">${prod.name}</td>
      <td style="font-size:12px;color:var(--text2)">${prod.spec||'-'}</td>
      <td class="tc" style="color:var(--text2)">${prevStock>0?prevStock.toLocaleString():'-'}</td>
      <td class="tc" style="color:var(--success);font-weight:${todayIn>0?700:400}">${todayIn>0?'+'+todayIn.toLocaleString():'-'}</td>
      <td class="tc" style="color:var(--danger);font-weight:${todayOut>0?700:400}">${todayOut>0?'-'+todayOut.toLocaleString():'-'}</td>
      <td class="tc" style="font-weight:700;color:${closing>0?'var(--primary)':'var(--text3)'}">${closing>0?closing.toLocaleString():'0'}</td>
    </tr>`;

    // 아코디언 - 하위 LOT 상세 (파렛트 분할)
    if(exp && lots.length>0){
      const palletQty=prod.pallet_qty||0;
      lots.forEach(l=>{
        const lTotalOut=l.outbound.reduce((s,o)=>s+o.box,0);
        const li=FL_STATE.lots.indexOf(l);
        const ohTag=l.lot_number&&l.lot_number.includes('-OH-')?'<span class="badge badge-gray" style="font-size:9px;margin-left:4px">초기재고</span>':'';
        const expTag=l.exp_date?'<span style="font-size:10px;color:var(--text3)">(~'+flFmtDate6(l.exp_date)+')</span>':'';

        if(palletQty>0){
          // LOT 헤더 행
          html+=`<tr style="background:#eef2f8;font-size:12px;cursor:default;" onclick="event.stopPropagation()">
            <td></td>
            <td colspan="2" style="padding-left:20px;font-weight:700;color:var(--primary)">${l.lot_number}${ohTag} ${expTag}</td>
            <td style="font-size:11px;color:var(--text3)">${flFmtDate6(l.mfg_date)}</td>
            <td class="tc" style="font-weight:600">${l.total_box}</td>
            <td class="tc" style="color:var(--danger);font-weight:600">${lTotalOut>0?lTotalOut:'-'}</td>
            <td class="tc" style="font-weight:700;color:${l.remain_box>0?'var(--success)':'var(--text3)'}">${l.remain_box}</td>
            <td class="tc"><button class="btn btn-sm btn-danger" style="font-size:10px;padding:2px 8px" onclick="event.stopPropagation();flDeleteStockLot(${li})">삭제</button></td>
          </tr>`;
          // 파렛트별 서브행
          const totalPallets=Math.ceil(l.total_box/palletQty);
          let outRemain=lTotalOut;
          for(let pi=1;pi<=totalPallets;pi++){
            const isLast=pi===totalPallets;
            const palletBox=isLast?(l.total_box-(totalPallets-1)*palletQty):palletQty;
            const consumed=Math.min(outRemain,palletBox);
            outRemain-=consumed;
            const remainBox=palletBox-consumed;
            const isEmpty=remainBox<=0;
            const isFullPallet=palletBox===palletQty;
            const subLot=`${l.lot_number.split('-').slice(0,2).join('-')}-${String(pi).padStart(2,'0')}`;
            const pLabel=isFullPallet?'1P':'';
            const boxLabel=isEmpty?'출고완료':`${remainBox}box`;
            const boxColor=isEmpty?'var(--text3)':remainBox===palletBox?'var(--success)':'var(--warning)';
            html+=`<tr style="background:var(--bg);font-size:11px;${isEmpty?'color:var(--text3);text-decoration:line-through;':''}" onclick="event.stopPropagation()">
              <td></td>
              <td colspan="2" style="padding-left:40px;${isEmpty?'':'color:var(--text2)'}">${subLot}${!isFullPallet?' <span style="font-size:10px;color:var(--warning)">(잔여)</span>':''}</td>
              <td class="tc" style="font-size:10px">${pLabel}</td>
              <td class="tc">${palletBox}</td>
              <td class="tc" style="color:var(--danger)">${consumed||'-'}</td>
              <td class="tc" style="color:${boxColor};font-weight:700">${boxLabel}</td>
              <td></td>
            </tr>`;
          }
        } else {
          // pallet_qty=0: LOT만 표시
          html+=`<tr style="background:var(--bg);font-size:12px;" onclick="event.stopPropagation()">
            <td></td>
            <td colspan="2" style="padding-left:24px;color:var(--text2)">${l.lot_number}${ohTag} ${expTag}</td>
            <td style="font-size:11px;color:var(--text3)">${flFmtDate6(l.mfg_date)}</td>
            <td class="tc">${l.total_box}</td>
            <td class="tc" style="color:var(--danger)">${lTotalOut>0?lTotalOut:'-'}</td>
            <td class="tc" style="color:${l.remain_box>0?'var(--success)':'var(--text3)'}; font-weight:700">${l.remain_box}</td>
            <td class="tc"><button class="btn btn-sm btn-danger" style="font-size:10px;padding:2px 8px" onclick="event.stopPropagation();flDeleteStockLot(${li})">삭제</button></td>
          </tr>`;
        }
      });
    }
  });
  tbody.innerHTML=html;
}

function flDeleteStockLot(idx){
  if(!confirm('이 LOT를 삭제하시겠습니까?')) return;
  const lot = FL_STATE.lots[idx];
  if(lot && lot.pkg_lot) flAddDeletedLot(lot.pkg_lot);
  FL_STATE.lots.splice(idx,1);
  flSave(); flRefreshOutboundCombos(); flRenderStock(); flRenderOutbound();
}
function flDeleteStockGroup(gk){
  if(!confirm(`"${gk}" 그룹 전체를 삭제하시겠습니까?\n해당 그룹의 모든 LOT와 출고내역이 삭제됩니다.`)) return;
  FL_STATE.lots.filter(l=>flGroupKey(l.lot_number)===gk).forEach(l=>{ if(l.pkg_lot) flAddDeletedLot(l.pkg_lot); });
  FL_STATE.lots=FL_STATE.lots.filter(l=>flGroupKey(l.lot_number)!==gk);

}

async function flBackup(){
  if(!window._db){alert('Firebase 연결 확인');return;}
  if(!confirm('현재 완제품 재고를 백업하시겠습니까?'))return;
  await window._db.collection('appData').doc('완제품_lots_backup').set({data:JSON.stringify(FL_STATE.lots),updatedAt:new Date().toISOString(),count:FL_STATE.lots.length});
  alert('백업 완료! ('+FL_STATE.lots.length+'건)');
}
async function flRestore(){
  if(!window._db){alert('Firebase 연결 확인');return;}
  const snap=await window._db.collection('appData').doc('완제품_lots_backup').get();
  if(!snap.exists||!snap.data().data){alert('저장된 백업이 없습니다.');return;}
  const bd=JSON.parse(snap.data().data);
  if(!confirm('백업으로 복원하시겠습니까? ('+bd.length+'건)\n현재 데이터는 사라집니다.'))return;
  FL_STATE.lots=bd;
  flSave();flRenderStock();flRefreshOutboundCombos();
  alert('복원 완료!');
}
function flOpenDispose(gk){
  const g=flGetGroups().find(x=>x.key===gk);
  if(!g){alert('그룹을 찾을 수 없습니다');return;}
  document.getElementById('flDispName').value=gk+' / '+g.name;
  document.getElementById('flDispRemain').value=g.remain_box+' box';
  document.getElementById('flDispQty').value='';
  const td=new Date();
  document.getElementById('flDispDate').value=String(td.getFullYear()).slice(2)+String(td.getMonth()+1).padStart(2,'0')+String(td.getDate()).padStart(2,'0');
  document.getElementById('flDispReason').value='기한초과';
  document.getElementById('flDisposeModal').dataset.gk=gk;
  document.getElementById('flDisposeModal').classList.add('open');
}
function flSaveDispose(){
  const gk=document.getElementById('flDisposeModal').dataset.gk;
  const boxes=parseInt(document.getElementById('flDispQty').value)||0;
  const date=document.getElementById('flDispDate').value;
  const reason=document.getElementById('flDispReason').value;
  if(!boxes){alert('폐기 박스수를 입력해주세요');return;}
  const g=flGetGroups().find(x=>x.key===gk);
  if(!g){alert('그룹을 찾을 수 없습니다');return;}
  if(boxes>g.remain_box){alert('잔량('+g.remain_box+'box)보다 많습니다');return;}
  // 잔량에서 차감 (출고와 동일한 방식)
  let toDeduct=boxes;
  const lots=FL_STATE.lots.filter(l=>flGroupKey(l.lot_number)===gk&&l.remain_box>0);
  for(const l of lots){
    if(toDeduct<=0)break;
    const deduct=Math.min(toDeduct,l.remain_box);
    l.outbound.push({box:deduct,client:'[폐기]'+reason,date:date});
    l.remain_box-=deduct;
    toDeduct-=deduct;
  }
  flSave();closeModal('flDisposeModal');flRenderStock();flRefreshOutboundCombos();
  alert(gk+' '+boxes+'box 폐기 처리 완료');
}

  const dateRaw=document.getElementById('flInitDate').value.replace(/\D/g,'');
  if(!lotCode||!qty){ alert('제품과 재고량을 입력해주세요'); return; }
  if(!exp||exp.length!==6){ alert('소비기한을 YYMMDD 형식으로 입력해주세요'); return; }
  const prod=FL_STATE.products.find(p=>p.lot_code===lotCode);
  const lotNumber=lotCode+'-OH-'+exp;
  // 이미 같은 LOT가 있으면 경고
  if(flInitRows.find(r=>r.lot_number===lotNumber)){ alert('동일한 LOT('+lotNumber+')가 이미 목록에 있습니다'); return; }
  flInitRows.push({
    lot_code: lotCode,
    name: prod?prod.name:'',
    lot_number: lotNumber,
    qty: qty,
    exp: exp,
    date: dateRaw.length===6?dateRaw:''
  });
  renderFlInitRows();
  document.getElementById('flInitQty').value='';
  const expEl=document.getElementById('flInitExp');
  expEl.value='';expEl.style.color='';expEl.style.fontWeight='';
  // 기준날짜 잠금
  document.getElementById('flInitDate').readOnly=true;
}

function renderFlInitRows(){
  document.getElementById('flInitStockTbody').innerHTML = flInitRows.map((r,i)=>`
    <tr>
      <td><span class="badge badge-blue" style="font-size:10px">${r.lot_code}</span></td>
      <td style="font-weight:600">${r.name}</td>
      <td style="font-size:11px;color:var(--primary);font-weight:600">${r.lot_number}</td>
      <td class="tc" style="font-weight:700">${r.qty}</td>
      <td class="tc">${r.exp?flFmtDate6(r.exp):'-'}</td>
      <td class="tc">${r.date?yymmddToISO2(r.date):'-'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="removeFlInitRow(${i})">삭제</button></td>
    </tr>`).join('')||'<tr><td colspan="7" class="tc" style="padding:12px;color:var(--text3)">등록된 전일재고 없음</td></tr>';
}

function removeFlInitRow(i){ flInitRows.splice(i,1); renderFlInitRows(); }

async function saveFlInitStock(){
  if(!flInitRows.length){ alert('등록할 재고가 없습니다'); return; }
  // 기존 OH 항목 제거
  FL_STATE.lots = FL_STATE.lots.filter(l=>!l.lot_number||!l.lot_number.includes('-OH-'));
  // 새 OH 항목 추가
  flInitRows.forEach(r=>{
    const prod=FL_STATE.products.find(p=>p.lot_code===r.lot_code);
    FL_STATE.lots.push({
      lot_number: r.lot_number,
      lot_code_base: r.lot_code,
      client: prod?prod.client:'',
      name: r.name,
      spec: prod?prod.spec:'',
      mfg_date: r.date||'',
      exp_date: r.exp||'',
      total_box: r.qty,
      remain_box: r.qty,
      is_partial: false,
      pkg_lot: '',
      outbound: [],
      reg_date: getTodayISO2()
    });
  });
  flSave();
  closeModal('flInitStockModal');
  flRenderStock();
  flRefreshOutboundCombos();
  alert('전일재고 '+flInitRows.length+'건 저장 완료');
}

// ===== 초기화 =====
(async ()=>{
  await loadFromFirebase();
  initFinishedLedger();
  const _todayRaw=new Date();
  const _yy=String(_todayRaw.getFullYear()).slice(2);
  const _mm=String(_todayRaw.getMonth()+1).padStart(2,'0');
  const _dd=String(_todayRaw.getDate()).padStart(2,'0');
  const _todayYYMMDD=`${_yy}${_mm}${_dd}`;
  const _obEl=document.getElementById('fl-ob-date');
  if(_obEl){ _obEl.value=`${_yy}.${_mm}.${_dd}`; _obEl.dataset.raw=_todayYYMMDD; _obEl.style.color='var(--primary)'; _obEl.style.fontWeight='700'; }
  const _stEl=document.getElementById('fl-st-date');
  if(_stEl){ _stEl.value=_todayYYMMDD; _stEl.style.color='var(--primary)'; _stEl.style.fontWeight='700'; }
  switchFlTab('outbound');
})();
</script>
