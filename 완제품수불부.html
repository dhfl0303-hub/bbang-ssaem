<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>완제품수불부</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--primary:#1a5fa8;--primary-light:#e8f0fb;--primary-dark:#0d3f75;--success:#1e9e6e;--success-light:#e6f5ef;--warning:#e07b1a;--warning-light:#fdf0e0;--danger:#d63031;--danger-light:#fff0f0;--border:#e0e4ea;--bg:#f4f6fa;--text:#1a1d23;--text2:#5a6070;--text3:#9aa0ad;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);}
.topbar{background:var(--primary-dark);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{color:#fff;font-size:16px;font-weight:700;}
.topbar-back{color:rgba(255,255,255,0.8);background:none;border:none;font-size:13px;cursor:pointer;}
.content{padding:20px;max-width:1400px;margin:0 auto;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:15px;font-weight:700;}
.card-bd{padding:20px;}
.filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.search-input{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:"Noto Sans KR",sans-serif;outline:none;min-width:160px;}
.search-input:focus{border-color:var(--primary);}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;cursor:pointer;font-family:"Noto Sans KR",sans-serif;font-weight:600;padding:8px 16px;font-size:13px;transition:all 0.15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fcc;}
.btn-sm{padding:5px 10px;font-size:12px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.stat-value{font-size:26px;font-weight:700;}
.stat-blue{color:var(--primary);}
.stat-green{color:var(--success);}
.stat-red{color:var(--danger);}
.table-wrap{overflow-x:auto;}
table{width:100%;min-width:600px;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg);}
th{padding:10px 12px;text-align:left;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:var(--primary-light);color:var(--primary);}
.badge-green{background:var(--success-light);color:var(--success);}
.badge-gray{background:#f0f0f0;color:#666;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);}
.modal-bd{padding:24px;}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-row{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:"Noto Sans KR",sans-serif;outline:none;width:100%;}
.form-input:focus{border-color:var(--primary);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fl-tab{padding:8px;border:none;border-radius:7px;font-family:"Noto Sans KR",sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.15s;}
.fl-tab.active{background:var(--primary);color:#fff;}
.fl-panel{display:none;}
.fl-panel.active{display:block;}
.tc{text-align:center;}</style>
</head>
<body>
<div class="topbar">
  <button class="topbar-back" onclick="location.href='통합관리.html'">← 통합관리</button>
  <div class="topbar-title">📦 완제품수불부</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn btn-outline btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.5)" onclick="printFinishedLedger()">🖨️ PDF출력</button>
    <button class="btn btn-outline btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.5)" onclick="flSyncFromPack()">🔄 동기화</button>
  </div>
</div>
<div class="content">
  <div style="display:flex;gap:4px;margin-bottom:16px;background:#fff;border-radius:10px;padding:6px;box-shadow:var(--shadow);">
    <button class="fl-tab active" id="fl-tab-outbound" onclick="switchFlTab('outbound')" style="flex:1;">🚚 출고등록</button>
    <button class="fl-tab" id="fl-tab-stock" onclick="switchFlTab('stock')" style="flex:1;">📊 재고조회</button>
    <button class="fl-tab" id="fl-tab-manage" onclick="switchFlTab('manage')" style="flex:1;">⚙️ 관리</button>

  <div class="fl-panel active" id="fl-panel-outbound">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="card">
        <div class="card-hd"><div class="card-hd-title">🚚 출고 등록</div></div>
        <div class="card-bd">
          <div class="form-row"><label class="form-label">그룹LOT 선택</label><select class="form-input" id="fl-ob-group" onchange="flOnGroupSelected()"><option value="">-- 선택 --</option></select></div>
          <div id="fl-ob-info" style="display:none;background:var(--bg);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="color:var(--text2)">품명</span><span id="fl-ob-info-name" style="font-weight:700">-</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="color:var(--text2)">거래처</span><span id="fl-ob-info-client">-</span></div>
            <div style="display:flex;justify-content:space-between;"><span style="color:var(--text2)">잔량</span><span id="fl-ob-info-remain" style="font-weight:700;color:var(--success)">-</span></div>
          </div>
          <div class="form-row"><label class="form-label">출고처</label><select class="form-input" id="fl-ob-client"><option value="">-- 선택 --</option></select></div>
          <div class="form-grid">
            <div class="form-row"><label class="form-label">출고일</label><input class="form-input" id="fl-ob-date" type="date"></div>
            <div class="form-row"><label class="form-label">출고 박스수</label><input class="form-input" id="fl-ob-boxes" type="number" placeholder="0"></div>
          </div>
          <button class="btn btn-success" style="width:100%;margin-top:8px;" onclick="flRegisterOutbound()">🚚 출고 등록</button>
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><div class="card-hd-title">📋 최근 출고 내역</div></div>
        <div class="card-bd" style="padding:0"><div class="table-wrap"><table style="min-width:400px"><thead><tr><th>그룹LOT</th><th>품명</th><th>출고처</th><th>출고일</th><th>박스</th></tr></thead><tbody id="fl-outbound-tbody"></tbody></table></div></div>
      </div>
    </div>
  </div>

  <div class="fl-panel" id="fl-panel-stock">
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">총 품목수</div><div class="stat-value stat-blue" id="fl-st-total-items">0</div></div>
      <div class="stat-box"><div class="stat-label">총 재고(box)</div><div class="stat-value stat-green" id="fl-st-total-box">0</div></div>
      <div class="stat-box"><div class="stat-label">재고소진</div><div class="stat-value stat-red" id="fl-st-zero-items">0</div></div>
    </div>
    <div class="filter-row">
      <select class="search-input" id="fl-st-client" onchange="flRenderStock()"><option value="전체">전체 거래처</option></select>
      <select class="search-input" id="fl-st-group" onchange="flRenderStock()"><option value="전체">전체 그룹</option></select>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;"><input type="checkbox" id="fl-st-hide-zero" onchange="flRenderStock()"> 재고있는것만</label>
    </div>
    <div class="card"><div class="card-bd" style="padding:0"><div class="table-wrap"><table style="min-width:700px"><thead><tr><th>▸</th><th>그룹LOT</th><th>거래처</th><th>품명</th><th>제조일자</th><th>소비기한</th><th>입고</th><th>출고</th><th>잔량</th></tr></thead><tbody id="fl-stock-tbody"></tbody></table></div></div></div>
  </div>

  <div class="fl-panel" id="fl-panel-manage">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <div class="card"><div class="card-hd"><div class="card-hd-title">🏷 제품 관리</div></div><div class="card-bd"><div class="form-grid"><div class="form-row"><label class="form-label">LOT코드</label><input class="form-input" id="fl-pm-lot-code" placeholder="예: E11"></div><div class="form-row"><label class="form-label">거래처</label><input class="form-input" id="fl-pm-client" placeholder="거래처명"></div><div class="form-row"><label class="form-label">제품명</label><input class="form-input" id="fl-pm-name" placeholder="제품명"></div><div class="form-row"><label class="form-label">규격</label><input class="form-input" id="fl-pm-spec" placeholder="예: 65g*24ea/box"></div><div class="form-row"><label class="form-label">파렛트당 박스</label><input class="form-input" id="fl-pm-pallet" type="number" placeholder="0"></div></div><button class="btn btn-primary btn-sm" style="width:100%;margin-top:8px;" onclick="flAddProduct()">+ 제품 추가</button></div></div>
        <div class="card"><div class="card-bd" style="padding:0"><div class="table-wrap"><table style="min-width:300px"><thead><tr><th>LOT</th><th>거래처</th><th>제품명</th><th>규격</th><th></th></tr></thead><tbody id="fl-product-tbody"></tbody></table></div></div></div>
      </div>
      <div>
        <div class="card"><div class="card-hd"><div class="card-hd-title">🏢 출고처 관리</div></div><div class="card-bd"><div style="display:flex;gap:8px;margin-bottom:10px;"><input class="form-input" id="fl-cl-new" placeholder="출고처명 입력"><button class="btn btn-primary btn-sm" onclick="flAddClient()">추가</button></div><div class="table-wrap"><table style="min-width:200px"><thead><tr><th>출고처명</th><th></th></tr></thead><tbody id="fl-client-tbody"></tbody></table></div></div></div>
        <div class="card"><div class="card-hd"><div class="card-hd-title">⚙ 데이터 관리</div></div><div class="card-bd" style="display:flex;flex-direction:column;gap:8px;"><button class="btn btn-outline btn-sm" style="width:100%" onclick="flSyncFromPack()">🔄 포장일지 동기화</button><button class="btn btn-danger btn-sm" style="width:100%" onclick="flResetData()">🗑 전체 데이터 초기화</button></div></div>
      </div>
    </div>
  </div>
</div>

<script>

function getTodayISO2(){ return new Date().toISOString().slice(0,10); }
function getToday(){ const d=new Date(); return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일'; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e,id){ if(e.target.id===id) closeModal(id); }
function closeAllModals(){ document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); }

// ===== 완제품수불부 =====
const FL_DEFAULT_CLIENTS=["골든박스컴퍼니","주식회사그라프팅","그린박스컴퍼니","스마트푸드네트웍스","파미유","오아시스성남센터","풍농오산물류센터","제때오산센터"];
let FL_STATE={lots:[],products:[],clients:[],expandedStock:new Set()};

function flSave(){
  localStorage.setItem('완제품_lots',JSON.stringify(FL_STATE.lots));
  localStorage.setItem('완제품_products',JSON.stringify(FL_STATE.products));
  localStorage.setItem('완제품_clients',JSON.stringify(FL_STATE.clients));
}
function flLoad(){
  FL_STATE.lots=JSON.parse(localStorage.getItem('완제품_lots')||'[]');
  FL_STATE.products=JSON.parse(localStorage.getItem('완제품_products')||'null')||[];
  FL_STATE.clients=JSON.parse(localStorage.getItem('완제품_clients')||'null')||FL_DEFAULT_CLIENTS;
}
function flGroupKey(lotNum){const p=lotNum.split('-');return p.length>=2?`${p[0]}-${p[1]}`:lotNum;}
function flGetGroups(hideZero=false,clientFilter='전체',groupFilter='전체'){
  const map={},order=[];
  for(const l of FL_STATE.lots){
    const gk=flGroupKey(l.lot_number);
    if(!map[gk]){map[gk]={key:gk,client:l.client,name:l.name,mfg_date:l.mfg_date,exp_date:l.exp_date,lots:[],total_box:0,remain_box:0,total_out:0};order.push(gk);}
    const g=map[gk];g.lots.push(l);g.total_box+=l.total_box;g.remain_box+=l.remain_box;g.total_out+=l.outbound.reduce((s,o)=>s+o.box,0);
  }
  let res=order.map(k=>map[k]);
  if(clientFilter!=='전체') res=res.filter(g=>g.client===clientFilter);
  if(groupFilter!=='전체') res=res.filter(g=>g.key===groupFilter);
  if(hideZero) res=res.filter(g=>g.remain_box>0);
  return res;
}
function flFmtDate6(d6){if(!d6||d6.length!==6)return d6||'-';return `20${d6.slice(0,2)}.${d6.slice(2,4)}.${d6.slice(4,6)}`;}
function flSyncFromPack(silent=false){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('packRecords_'));
  let count=0;
  keys.forEach(k=>{
    const recs=JSON.parse(localStorage.getItem(k)||'[]');
    recs.forEach(r=>{
      if(!r.lot||!r.productCode) return;
      const existing=FL_STATE.lots.find(l=>l.pkg_lot===r.lot);
      if(existing) return;
      const prod=FL_STATE.products.find(p=>p.lot_code===r.productCode);
      const mfg=r.date||'';
      const existCount=FL_STATE.lots.filter(l=>l.lot_code_base===r.productCode&&l.mfg_date===mfg).length;
      const lotNum=`${r.productCode}-${mfg}-${String(existCount+1).padStart(2,'0')}`;
      FL_STATE.lots.push({lot_number:lotNum,lot_code_base:r.productCode,client:prod?prod.client:'',name:r.product||prod?.name||'',spec:prod?.spec||'',mfg_date:mfg,exp_date:r.expiryDate||'',total_box:parseInt(r.qtyBoxes)||0,remain_box:parseInt(r.qtyBoxes)||0,is_partial:false,pkg_lot:r.lot,outbound:[],reg_date:r.date||getTodayISO2()});
      count++;
    });
  });
  flSave();
  if(!silent) alert(`동기화 완료: ${count}건 추가`);
  flRenderStock();flRefreshOutboundCombos();
}
function initFinishedLedger(){flLoad();flSyncFromPack(true);}
function switchFlTab(tab){
  document.querySelectorAll('.fl-tab').forEach(b=>{b.style.background='transparent';b.style.color='var(--text2)';});
  document.querySelectorAll('.fl-panel').forEach(p=>p.style.display='none');
  document.getElementById('fl-tab-'+tab).style.background='var(--primary)';
  document.getElementById('fl-tab-'+tab).style.color='#fff';
  document.getElementById('fl-panel-'+tab).style.display='block';
  if(tab==='outbound'){flRefreshOutboundCombos();flRenderOutbound();}
  if(tab==='stock') flRenderStock();
  if(tab==='manage'){flRenderProductTable();flRenderClientTable();}
}
function flRefreshOutboundCombos(){
  const grps=flGetGroups(true);
  const sel=document.getElementById('fl-ob-group');
  if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">-- 선택 --</option>'+grps.map(g=>`<option value="${g.key}">${g.key} / ${g.name} / 잔량:${g.remain_box}box</option>`).join('');
  if(cur) sel.value=cur;
  const csel=document.getElementById('fl-ob-client');
  if(csel) csel.innerHTML='<option value="">-- 선택 --</option>'+FL_STATE.clients.map(c=>`<option value="${c}">${c}</option>`).join('');
  flOnGroupSelected();
}
function flOnGroupSelected(){
  const gk=document.getElementById('fl-ob-group')?.value;
  const info=document.getElementById('fl-ob-info');
  if(!gk||!info){if(info)info.style.display='none';return;}
  const g=flGetGroups().find(x=>x.key===gk);
  if(!g) return;
  info.style.display='block';
  document.getElementById('fl-ob-info-name').textContent=g.name;
  document.getElementById('fl-ob-info-client').textContent=g.client;
  document.getElementById('fl-ob-info-remain').textContent=g.remain_box+' box';
}
function flRegisterOutbound(){
  const gk=document.getElementById('fl-ob-group').value;
  if(!gk){alert('그룹LOT를 선택해주세요');return;}
  const client=document.getElementById('fl-ob-client').value;
  if(!client){alert('출고처를 선택해주세요');return;}
  const date=document.getElementById('fl-ob-date').value;
  if(!date){alert('출고일을 선택해주세요');return;}
  const boxes=parseInt(document.getElementById('fl-ob-boxes').value)||0;
  if(!boxes){alert('출고 박스수를 입력해주세요');return;}
  const g=flGetGroups().find(x=>x.key===gk);
  if(!g){alert('그룹을 찾을 수 없습니다');return;}
  if(boxes>g.remain_box){alert(`잔량(${g.remain_box}box)보다 많습니다`);return;}
  let toDeduct=boxes;
  const lots=FL_STATE.lots.filter(l=>flGroupKey(l.lot_number)===gk&&l.remain_box>0);
  for(const l of lots){if(toDeduct<=0)break;const deduct=Math.min(toDeduct,l.remain_box);l.outbound.push({box:deduct,client,date});l.remain_box-=deduct;toDeduct-=deduct;}
  flSave();flRefreshOutboundCombos();flRenderOutbound();flRenderStock();
  alert(`출고 등록 완료! ${boxes}box`);
  document.getElementById('fl-ob-boxes').value='';
}
function flRenderOutbound(){
  const groups=flGetGroups().filter(g=>g.total_out>0).reverse();
  const tbody=document.getElementById('fl-outbound-tbody');
  if(!tbody) return;
  if(!groups.length){tbody.innerHTML='<tr><td colspan="5" class="tc" style="padding:24px;color:var(--text3)">출고 내역이 없습니다</td></tr>';return;}
  let html='';
  for(const g of groups){
    const outbounds=[];
    for(const l of g.lots) for(const o of l.outbound) outbounds.push({...o,lot:l.lot_number});
    outbounds.forEach(o=>{html+=`<tr><td style="font-size:11px;color:var(--primary);font-weight:700">${g.key}</td><td style="font-weight:600">${g.name}</td><td style="font-size:12px">${o.client}</td><td style="font-size:12px">${o.date}</td><td class="tc" style="font-weight:700;color:var(--danger)">${o.box.toLocaleString()}</td></tr>`;});
  }
  tbody.innerHTML=html;
}
function flRenderStock(){
  const clientFilter=document.getElementById('fl-st-client')?.value||'전체';
  const groupFilter=document.getElementById('fl-st-group')?.value||'전체';
  const hideZero=document.getElementById('fl-st-hide-zero')?.checked||false;
  const groups=flGetGroups(hideZero,clientFilter,groupFilter);
  const allGroups=flGetGroups();
  const ti=document.getElementById('fl-st-total-items');const tb=document.getElementById('fl-st-total-box');const zi=document.getElementById('fl-st-zero-items');
  if(ti) ti.textContent=allGroups.length;
  if(tb) tb.textContent=allGroups.reduce((s,g)=>s+g.remain_box,0).toLocaleString();
  if(zi) zi.textContent=allGroups.filter(g=>g.remain_box===0).length;
  const clients=[...new Set(FL_STATE.lots.map(l=>l.client))].sort();
  const csel=document.getElementById('fl-st-client');
  if(csel){const cv=csel.value;csel.innerHTML='<option value="전체">전체 거래처</option>'+clients.map(c=>`<option value="${c}">${c}</option>`).join('');csel.value=cv;}
  const gsel=document.getElementById('fl-st-group');
  if(gsel){const gv=gsel.value;gsel.innerHTML='<option value="전체">전체 그룹</option>'+allGroups.map(g=>`<option value="${g.key}">${g.key} / ${g.name}</option>`).join('');gsel.value=gv;}
  const tbody=document.getElementById('fl-stock-tbody');
  if(!tbody) return;
  if(!groups.length){tbody.innerHTML='<tr><td colspan="9" class="tc" style="padding:24px;color:var(--text3)">재고 데이터가 없습니다</td></tr>';return;}
  let html='';
  for(const g of groups){
    const exp=FL_STATE.expandedStock.has(g.key);
    html+=`<tr style="cursor:pointer;${g.remain_box===0?'color:var(--text3);':''}" onclick="flToggleStock('${g.key}')"><td>${exp?'▼':'▶'}</td><td style="font-size:11px;font-weight:700;color:var(--primary)">${g.key}</td><td style="font-size:12px">${g.client}</td><td style="font-weight:600">${g.name}</td><td class="tc" style="font-size:12px">${flFmtDate6(g.mfg_date)}</td><td class="tc" style="font-size:12px">${g.exp_date||'-'}</td><td class="tc" style="color:var(--success);font-weight:700">${g.total_box.toLocaleString()}</td><td class="tc" style="color:var(--danger)">${g.total_out.toLocaleString()}</td><td class="tc" style="font-weight:700;color:${g.remain_box>0?'var(--primary)':'var(--text3)'}">${g.remain_box.toLocaleString()}</td></tr>`;
    if(exp){for(const l of g.lots){const totalOut=l.outbound.reduce((s,o)=>s+o.box,0);html+=`<tr style="background:var(--bg);font-size:12px;"><td></td><td colspan="3" style="color:var(--text2);padding-left:24px">${l.lot_number}</td><td></td><td></td><td class="tc">${l.total_box}</td><td class="tc">${totalOut}</td><td class="tc" style="color:${l.remain_box>0?'var(--success)':'var(--text3)'}">${l.remain_box}</td></tr>`;}}
  }
  tbody.innerHTML=html;
}
function flToggleStock(gk){if(FL_STATE.expandedStock.has(gk))FL_STATE.expandedStock.delete(gk);else FL_STATE.expandedStock.add(gk);flRenderStock();}
function flAddProduct(){
  const lotCode=document.getElementById('fl-pm-lot-code').value.trim();
  const client=document.getElementById('fl-pm-client').value.trim();
  const name=document.getElementById('fl-pm-name').value.trim();
  const spec=document.getElementById('fl-pm-spec').value.trim();
  const palletQty=parseInt(document.getElementById('fl-pm-pallet').value)||0;
  if(!lotCode||!name){alert('LOT코드와 제품명을 입력해주세요');return;}
  if(FL_STATE.products.find(p=>p.lot_code===lotCode)){alert('이미 존재하는 LOT코드입니다');return;}
  FL_STATE.products.push({lot_code:lotCode,client,name,spec,pallet_qty:palletQty});
  flSave();flRenderProductTable();alert('제품 추가 완료');
  ['fl-pm-lot-code','fl-pm-client','fl-pm-name','fl-pm-spec','fl-pm-pallet'].forEach(id=>document.getElementById(id).value='');
}
function flDeleteProduct(lotCode){if(!confirm(`'${lotCode}' 제품을 삭제하시겠습니까?`))return;FL_STATE.products=FL_STATE.products.filter(p=>p.lot_code!==lotCode);flSave();flRenderProductTable();}
function flRenderProductTable(){
  const el=document.getElementById('fl-product-tbody');
  if(!el) return;
  el.innerHTML=FL_STATE.products.map(p=>`<tr><td><span class="badge badge-blue" style="font-size:10px">${p.lot_code}</span></td><td style="font-size:12px">${p.client}</td><td style="font-weight:600">${p.name}</td><td style="font-size:11px;color:var(--text2)">${p.spec}</td><td><button class="btn btn-sm btn-danger" onclick="flDeleteProduct('${p.lot_code}')">삭제</button></td></tr>`).join('')||'<tr><td colspan="5" class="tc" style="padding:16px;color:var(--text3)">등록된 제품이 없습니다</td></tr>';
}
function flAddClient(){
  const name=document.getElementById('fl-cl-new').value.trim();
  if(!name) return;
  if(FL_STATE.clients.includes(name)){alert('이미 존재하는 출고처입니다');return;}
  FL_STATE.clients.push(name);flSave();flRenderClientTable();document.getElementById('fl-cl-new').value='';
}
function flDeleteClient(name){if(!confirm(`'${name}' 출고처를 삭제하시겠습니까?`))return;FL_STATE.clients=FL_STATE.clients.filter(c=>c!==name);flSave();flRenderClientTable();}
function flRenderClientTable(){
  const el=document.getElementById('fl-client-tbody');
  if(!el) return;
  el.innerHTML=FL_STATE.clients.map(c=>`<tr><td style="font-weight:600">${c}</td><td><button class="btn btn-sm btn-danger" onclick="flDeleteClient('${c}')">삭제</button></td></tr>`).join('');
}
function flResetData(){if(!confirm('완제품수불부 전체 데이터를 초기화하시겠습니까?'))return;FL_STATE.lots=[];FL_STATE.products=[];FL_STATE.clients=FL_DEFAULT_CLIENTS;flSave();flRenderStock();flRenderProductTable();flRenderClientTable();alert('초기화 완료');}
function printFinishedLedger(){
  const groups=flGetGroups().reverse();
  if(!groups.length){alert('출력할 데이터가 없습니다');return;}
  let bodyHtml='';
  groups.forEach(g=>{bodyHtml+=`<tr><td class="bold blue">${g.key}</td><td class="left bold">${g.name}</td><td>${g.client}</td><td>${flFmtDate6(g.mfg_date)}</td><td>${g.exp_date||'-'}</td><td>${g.total_box.toLocaleString()}</td><td>${g.total_out.toLocaleString()}</td><td class="bold">${g.remain_box.toLocaleString()}</td></tr>`;});
  const today=getTodayISO2();
  const printWin=window.open('','_blank');
  printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>완제품수불부 ${today}</title><style>body{font-family:"Noto Sans KR",sans-serif;font-size:10px;padding:20px;}h2{font-size:16px;margin-bottom:4px;}.sub{font-size:12px;color:#666;margin-bottom:14px;}table{width:100%;border-collapse:collapse;}th{background:#f0f0f0;border:1px solid #999;padding:5px;text-align:center;font-weight:700;}td{border:1px solid #999;padding:5px;text-align:center;}td.left{text-align:left;}td.bold{font-weight:700;}td.blue{color:#1a5fa8;}@page{margin:10mm;size:A4 landscape;}</style></head><body><h2>완제품수불부</h2><div class="sub">출력일시: ${new Date().toLocaleString('ko-KR')}</div><table><thead><tr><th>그룹LOT</th><th>품명</th><th>거래처</th><th>제조일자</th><th>소비기한</th><th>입고(box)</th><th>출고(box)</th><th>잔량(box)</th></tr></thead><tbody>${bodyHtml}</tbody></table></body></html>`);
  printWin.document.close();
  setTimeout(()=>printWin.print(),500);
}

// ===== 초기화 =====
initFinishedLedger();
document.getElementById('fl-ob-date').value=getTodayISO2();
switchFlTab('outbound');
</script>
</body>
