<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원료수불부</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--primary:#1a5fa8;--primary-light:#e8f0fb;--primary-dark:#0d3f75;--success:#1e9e6e;--success-light:#e6f5ef;--warning:#e07b1a;--warning-light:#fdf0e0;--danger:#d63031;--danger-light:#fff0f0;--border:#e0e4ea;--bg:#f4f6fa;--text:#1a1d23;--text2:#5a6070;--text3:#9aa0ad;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);}
.topbar{background:var(--primary-dark);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{color:#fff;font-size:16px;font-weight:700;}
.topbar-back{color:rgba(255,255,255,0.8);background:none;border:none;font-size:13px;cursor:pointer;}
.content{padding:20px;max-width:1400px;margin:0 auto;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:15px;font-weight:700;}
.card-bd{padding:20px;}
.filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.search-input{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:"Noto Sans KR",sans-serif;outline:none;min-width:160px;}
.search-input:focus{border-color:var(--primary);}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;cursor:pointer;font-family:"Noto Sans KR",sans-serif;font-weight:600;padding:8px 16px;font-size:13px;transition:all 0.15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fcc;}
.btn-sm{padding:5px 10px;font-size:12px;}
.table-wrap{overflow-x:auto;}
table{width:100%;min-width:900px;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg);}
th{padding:10px 12px;text-align:left;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:var(--primary-light);color:var(--primary);}
.badge-green{background:var(--success-light);color:var(--success);}
.badge-orange{background:var(--warning-light);color:var(--warning);}
.badge-red{background:var(--danger-light);color:var(--danger);}
.badge-gray{background:#f0f0f0;color:#666;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);}
.modal-bd{padding:24px;}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-row{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:"Noto Sans KR",sans-serif;outline:none;width:100%;}
.form-input:focus{border-color:var(--primary);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--primary);border-top:none;border-radius:0 0 8px 8px;max-height:180px;overflow-y:auto;z-index:999;display:none;}
.autocomplete-list.open{display:block;}
.autocomplete-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
.autocomplete-item:hover{background:var(--primary-light);color:var(--primary);}
@media print{
  .topbar,.filter-row,.btn{display:none!important;}
  .card-hd .badge{display:none!important;}
  body{background:#fff;}
  .card{box-shadow:none;border:1px solid #ddd;}
}
</style>
</head>
<body>
<div class="topbar">
  <button class="topbar-back" onclick="location.href='통합관리.html'">← 통합관리</button>
  <div class="topbar-title">📒 원료수불부</div>
  <div id="topbarDate" style="color:rgba(255,255,255,0.7);font-size:12px;"></div>
</div>
<div class="content">
  <div class="filter-row">
    <div>
      <label style="font-size:12px;font-weight:700;color:var(--text2);margin-right:6px">조회 날짜</label>
      <input type="date" class="search-input" id="ledgerDate" style="min-width:160px" onchange="renderLedger()">
    </div>
    <input class="search-input" placeholder="원료명 검색..." id="ledgerSearch" oninput="renderLedger()">
    <select class="search-input" id="ledgerFilter" onchange="renderLedger()" style="min-width:140px">
      <option value="">전체 보관기준</option>
      <option value="실온">실온</option>
      <option value="냉장">냉장</option>
      <option value="냉동">냉동</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="renderLedger()">조회</button>
    <button class="btn btn-outline btn-sm" onclick="printLedger()">🖨️ 출력</button>
    <button class="btn btn-sm" style="background:var(--warning-light);color:var(--warning);border:1px solid #f0c080" onclick="openInitStock()">📋 전일재고 등록</button>
    <button class="btn btn-outline btn-sm" onclick="openInModal()">+ 입고 등록</button>
    <button class="btn btn-danger btn-sm" onclick="openOutModal()">- 출고 등록</button>
  </div>
  <div class="card">
    <div class="card-hd">
      <div class="card-hd-title">수불 현황</div>
      <span class="badge badge-blue" id="ledgerDateDisplay"></span>
    </div>
    <div class="card-bd" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>코드</th><th>품목명</th><th>원산지</th><th>보관기준</th><th>단위</th><th>전일재고</th><th>입고</th><th>출고</th><th>마감재고</th></tr></thead>
          <tbody id="ledgerTbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 입고 모달 -->
<div class="modal-overlay" id="inModal" onclick="closeModalOutside(event,'inModal')">
  <div class="modal">
    <div class="modal-hd"><div class="modal-title">+ 입고 등록</div><button class="modal-close" onclick="closeModal('inModal')">×</button></div>
    <div class="modal-bd">
      <div class="form-row"><label class="form-label">원료</label><div class="autocomplete-wrap"><input class="form-input" id="inIngName" placeholder="원료명 입력/검색" autocomplete="off" oninput="showIngAC('inIngName')" onfocus="showIngAC('inIngName')" onblur="setTimeout(()=>hideIngAC('inIngName'),150)"><div class="autocomplete-list" id="ac-inIngName"></div></div></div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">날짜</label><input class="form-input" id="inDate" type="date"></div>
        <div class="form-row"><label class="form-label">수량 (kg)</label><input class="form-input" id="inQty" type="number" placeholder="0" step="0.001"></div>
        <div class="form-row"><label class="form-label">LOT</label><input class="form-input" id="inLot" placeholder="LOT번호"></div>
        <div class="form-row"><label class="form-label">소비기한</label><input class="form-input" id="inExp" type="date"></div>
      </div>
    </div>
    <div class="modal-ft"><button class="btn btn-outline" onclick="closeModal('inModal')">취소</button><button class="btn btn-primary" onclick="saveIn()">저장</button></div>
  </div>
</div>

<!-- 출고 모달 -->
<div class="modal-overlay" id="outModal" onclick="closeModalOutside(event,'outModal')">
  <div class="modal">
    <div class="modal-hd"><div class="modal-title">- 출고 등록</div><button class="modal-close" onclick="closeModal('outModal')">×</button></div>
    <div class="modal-bd">
      <div class="form-row"><label class="form-label">원료</label><div class="autocomplete-wrap"><input class="form-input" id="outIngName" placeholder="원료명 입력/검색" autocomplete="off" oninput="showIngAC('outIngName')" onfocus="showIngAC('outIngName')" onblur="setTimeout(()=>hideIngAC('outIngName'),150)"><div class="autocomplete-list" id="ac-outIngName"></div></div></div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">날짜</label><input class="form-input" id="outDate" type="date"></div>
        <div class="form-row"><label class="form-label">수량 (kg)</label><input class="form-input" id="outQty" type="number" placeholder="0" step="0.001"></div>
        <div class="form-row"><label class="form-label">배합LOT</label><input class="form-input" id="outLot" placeholder="배합LOT번호"></div>
        <div class="form-row"><label class="form-label">비고</label><input class="form-input" id="outNote" placeholder="비고"></div>
      </div>
    </div>
    <div class="modal-ft"><button class="btn btn-outline" onclick="closeModal('outModal')">취소</button><button class="btn btn-danger" onclick="saveOut()">출고 저장</button></div>
  </div>
</div>

<!-- 전일재고 모달 -->
<div class="modal-overlay" id="initStockModal" onclick="closeModalOutside(event,'initStockModal')">
  <div class="modal" style="width:720px">
    <div class="modal-hd"><div class="modal-title">📋 전일재고 등록</div><button class="modal-close" onclick="closeModal('initStockModal')">×</button></div>
    <div class="modal-bd">
      <div style="background:var(--warning-light);border:1px solid #f0c080;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--warning)">⚠️ 전일 마감재고를 전일재고로 입력하세요.</div>
      <div class="form-grid" style="margin-bottom:12px">
        <div class="form-row"><label class="form-label">기준날짜 YYMMDD</label><input class="form-input" id="initDate" placeholder="예: 260528" maxlength="6" inputmode="numeric" oninput="fmtInitDate(this)"></div>
        <div class="form-row"><label class="form-label">원료 선택</label><div class="autocomplete-wrap"><input class="form-input" id="initIngName" placeholder="원료명 입력/검색" autocomplete="off" oninput="showIngAC('initIngName')" onfocus="showIngAC('initIngName')" onblur="setTimeout(()=>hideIngAC('initIngName'),150)"><div class="autocomplete-list" id="ac-initIngName"></div></div></div>
        <div class="form-row"><label class="form-label">재고량 (kg)</label><input class="form-input" id="initQty" type="number" placeholder="0" step="0.001"></div>
        <div class="form-row"><label class="form-label">소비기한 YYMMDD</label><input class="form-input" id="initExp" placeholder="예: 270518" maxlength="6" inputmode="numeric" oninput="fmtInitDate(this)"></div>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-bottom:16px" onclick="addInitRow()">+ 추가</button>
      <div style="font-size:12px;font-weight:700;margin-bottom:6px;">신규 추가</div>
      <div class="table-wrap" style="margin-bottom:16px;"><table><thead><tr><th>원료명</th><th>코드</th><th>재고량(kg)</th><th>소비기한</th><th>기준일</th><th></th></tr></thead><tbody id="initStockTbody"></tbody></table></div>
      <div style="font-size:12px;font-weight:700;margin-bottom:6px;">기존 전일재고</div>
      <div class="table-wrap"><table><thead><tr><th>원료명</th><th>코드</th><th>재고량</th><th>소비기한</th><th>기준일</th><th>관리</th></tr></thead><tbody id="savedInitStockTbody"></tbody></table></div>
    </div>
    <div class="modal-ft"><button class="btn btn-outline" onclick="closeModal('initStockModal')">취소</button><button class="btn btn-primary" onclick="saveInitStock()">전체 저장</button></div>
  </div>
</div>

let ledgerRecords = [];
let initRows = [];

function initLedger(){
  ledgerRecords = JSON.parse(localStorage.getItem('ledgerRecords')||'[]');
  try{
    const recs=JSON.parse(localStorage.getItem('incomingRecords')||'[]');
    recs.forEach(rec=>{
      (rec.rows||[]).forEach(row=>{
        if(!row.product||!row.qty) return;
        const uniqueKey='in_'+(row.lot||'')+row.product+(rec.date||'');
        const exists=ledgerRecords.find(r=>r._key===uniqueKey);
        if(!exists){
          const ing=getIngByName(row.product);
          ledgerRecords.push({date:rec.date||getTodayISO2(),name:row.product,code:ing?ing.code:row.lot?.split('-')[0]||'',qty:parseFloat(row.qty)||0,exp:row.exp||'',lot:row.lot||'',type:'in',_key:uniqueKey});
        }
      });
    });
    localStorage.setItem('ledgerRecords',JSON.stringify(ledgerRecords));
  }catch(e){}
}

function getTodayISO2(){ return new Date().toISOString().slice(0,10); }

function getToday(){ const d=new Date(); return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일'; }

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function closeModalOutside(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

function showIngAC(inputId){
  const input=document.getElementById(inputId);
  const list=document.getElementById('ac-'+inputId);
  const q=input.value.trim().toLowerCase();
  const names=INGREDIENT_DB.filter(i=>!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q));
  if(!names.length){ list.classList.remove('open'); return; }
  list.innerHTML=names.slice(0,15).map(i=>`
    <div class="autocomplete-item" onmousedown="selectIngAC('${inputId}','${i.name.replace(/'/g,"\'")}')">
      <span style="color:var(--text3);font-size:11px;margin-right:6px">${i.code}</span>${i.name}
    </div>`).join('');
  list.classList.add('open');
}

function hideIngAC(inputId){ const el=document.getElementById('ac-'+inputId); if(el) el.classList.remove('open'); }

function getIngByName(name){ return INGREDIENT_DB.find(i=>i.name===name); }

function getIngByCode(code){ return INGREDIENT_DB.find(i=>i.code===code); }

function renderLedger(){
  const selDate=document.getElementById('ledgerDate').value||getTodayISO2();
  const q=document.getElementById('ledgerSearch').value.trim().toLowerCase();
  const stor=document.getElementById('ledgerFilter').value;
  document.getElementById('ledgerDateDisplay').textContent=selDate;

  // 선택 날짜의 월 범위
  const [sy,sm]=selDate.split('-').map(Number);
  const monthStart=`${sy}-${String(sm).padStart(2,'0')}-01`;
  const prevMonthEnd=new Date(sy,sm-1,0);
  const prevEnd=prevMonthEnd.toISOString().slice(0,10);

  // 원료 필터
  let ings=INGREDIENT_DB.filter(i=>{
    const qMatch=!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q);
    const sMatch=!stor||i.storage.includes(stor);
    return qMatch&&sMatch;
  });

  const tbody=document.getElementById('ledgerTbody');
  if(!ings.length){ tbody.innerHTML='<tr><td colspan="9" class="tc" style="padding:24px;color:var(--text3)">검색 결과가 없습니다</td></tr>'; return; }

  tbody.innerHTML=ings.map(ing=>{
    // 전일재고: init은 날짜 무관, in/out은 selDate 이전
    const prevInit=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='init').reduce((s,r)=>s+r.qty,0);
    const prevIn=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='in'&&r.date<selDate).reduce((s,r)=>s+r.qty,0);
    const prevOut=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='out'&&r.date<selDate).reduce((s,r)=>s+r.qty,0);
    const prevStock=Math.max(0,prevInit+prevIn-prevOut);

    // 당일 입고/출고
    const monthIn=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='in'&&r.date===selDate).reduce((s,r)=>s+r.qty,0);
    const monthOut=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='out'&&r.date===selDate).reduce((s,r)=>s+r.qty,0);
    const closing=Math.max(0,prevStock+monthIn-monthOut);

    // 스토리지 뱃지
    const stor=ing.storage||'';
    const storTags=[];
    if(/실온|상온|1~35|15~25|1~25|1~36/.test(stor)) storTags.push('<span class="badge badge-gray" style="font-size:10px;">실온</span>');
    if(/0~5|냉장보관.*5|0~5℃/.test(stor)) storTags.push('<span class="badge badge-green" style="font-size:10px;">냉장(0~5℃)</span>');
    if(/0~10|개봉후.*냉장|2~8/.test(stor)||(stor.includes('냉장')&&!/0~5/.test(stor))) storTags.push('<span class="badge badge-green" style="font-size:10px;">냉장(0~10℃)</span>');
    if(/-18|냉동/.test(stor)) storTags.push('<span class="badge badge-blue" style="font-size:10px;">냉동</span>');
    if(!storTags.length) storTags.push('<span class="badge badge-gray" style="font-size:10px;">-</span>');
    const storDisplay=storTags.join(' ');

    return `<tr>
      <td><span class="badge badge-blue" style="font-size:10px">${ing.code}</span></td>
      <td style="font-weight:600">${ing.name}</td>
      <td style="font-size:12px;color:var(--text2)">${ing.origin||'-'}</td>
      <td style="white-space:nowrap;">${storDisplay}</td>
      <td class="tc" style="font-size:12px">${ing.unit||'kg'}</td>
      <td class="tc" style="color:var(--text2)">${prevStock>0?prevStock.toFixed(3):'-'}</td>
      <td class="tc" style="color:var(--success);font-weight:${monthIn>0?700:400}">${monthIn>0?'+'+monthIn.toFixed(3):'-'}</td>
      <td class="tc" style="color:var(--danger);font-weight:${monthOut>0?700:400}">${monthOut>0?'-'+monthOut.toFixed(3):'-'}</td>
      <td class="tc" style="font-weight:700;color:${closing>0?'var(--primary)':'var(--text3)'}">${closing>0?closing.toFixed(3):'0.000'}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-sm btn-primary" onclick="openAddLedgerRecord('${ing.name}','${ing.code}')">+ 등록</button>
        <button class="btn btn-sm btn-outline" onclick="openEditIngredient('${ing.code}')">수정</button>
        <button class="btn btn-sm btn-danger" onclick="deleteLedgerByName('${ing.name}')">삭제</button>
      </td>
    </tr>`;
  }).join('');
}

function saveLedger(){ localStorage.setItem('ledgerRecords', JSON.stringify(ledgerRecords)); }

function fmtInitDate(input){
  const v=input.value.replace(/\D/g,'').slice(0,6);
  input.value=v;
  if(v.length===6){input.dataset.formatted=`${v.slice(0,2)}.${v.slice(2,4)}.${v.slice(4,6)}`;input.style.color='var(--primary)';input.style.fontWeight='700';}
  else{input.dataset.formatted='';input.style.color='';input.style.fontWeight='';}
}

function getInitDateVal(id){
  const el=document.getElementById(id);
  if(!el) return '';
  return el.dataset.formatted||el.value||'';
}

function openInitStock(e){
  if(e){e.preventDefault();e.stopPropagation();}
  closeAllModals();
  initRows = [];
  const tb=document.getElementById('initStockTbody');
  if(tb) tb.innerHTML='';
  const initDate=document.getElementById('initDate');
  if(initDate) initDate.value=getTodayISO2();
  const initIngName=document.getElementById('initIngName');
  if(initIngName) initIngName.value='';
  const initQty=document.getElementById('initQty');
  if(initQty) initQty.value='';
  const initExp=document.getElementById('initExp');
  if(initExp) initExp.value='';
  const modal=document.getElementById('initStockModal');
  if(modal) modal.classList.add('open');
  else alert('모달을 찾을 수 없습니다. 페이지를 새로고침해주세요.');
}

function addInitRow(){
  const name = document.getElementById('initIngName').value.trim();
  const qty = parseFloat(document.getElementById('initQty').value)||0;
  const exp = document.getElementById('initExp').value;
  const date = document.getElementById('initDate').value||getTodayISO2();
  if(!name||!qty||!exp){ alert('원료명, 재고량, 소비기한을 모두 입력해주세요'); return; }
  const ing = getIngByName(name);
  const row = {date, name, code:ing?ing.code:'', qty, exp, type:'init'};
  initRows.push(row);
  renderInitRows();
  document.getElementById('initIngName').value='';
  document.getElementById('initQty').value='';
  document.getElementById('initExp').value='';
}

function renderInitRows(){
  document.getElementById('initStockTbody').innerHTML = initRows.map((r,i)=>`
    <tr>
      <td style="font-weight:600">${r.name}</td>
      <td><span class="badge badge-blue" style="font-size:10px">${r.code}</span></td>
      <td class="tc">${r.qty.toFixed(3)}</td>
      <td class="tc">${r.exp}</td>
      <td class="tc">${r.date}</td>
      <td><button class="btn btn-sm btn-danger" onclick="removeInitRow(${i})">삭제</button></td>
    </tr>`).join('');
}

function removeInitRow(i){ initRows.splice(i,1); renderInitRows(); }

function saveInitStock(){
  if(!initRows.length){ alert('등록할 재고가 없습니다'); return; }
  // init 타입으로 ledgerRecords에 추가
  ledgerRecords = ledgerRecords.filter(r=>r.type!=='init');
  initRows.forEach(r=>ledgerRecords.push(r));
  saveLedger();
  // ingStock에도 자동 반영
  initRows.forEach(r=>{
    const exists = ingStock.find(s=>s.name===r.name && s.expiry===r.exp);
    if(!exists){
      ingStock.push({name:r.name, code:r.code||'', qty:r.qty*1000, expiry:r.exp});
    }
  });
  saveData('ingStock', ingStock);
  closeModal('initStockModal');
  renderLedger();
  alert(`초기재고 ${initRows.length}건 저장 완료`);
}

function renderSavedInitStock(){
  const tbody=document.getElementById('savedInitStockTbody');
  if(!tbody) return;
  const saved=ledgerRecords.filter(r=>r.type==='init');
  if(!saved.length){tbody.innerHTML='<tr><td colspan="6" class="tc" style="padding:12px;color:var(--text3)">등록된 전일재고 없음</td></tr>';return;}
  tbody.innerHTML=saved.map(r=>`<tr><td style="font-weight:600">${r.name}</td><td><span class="badge badge-blue" style="font-size:10px">${r.code||'-'}</span></td><td class="tc">${r.qty}</td><td class="tc">${r.exp||'-'}</td><td class="tc">${r.date}</td><td><button class="btn btn-sm btn-danger" onclick="deleteSavedInitRow('${r._initKey||r.name+r.date}')">삭제</button></td></tr>`).join('');
}

function deleteSavedInitRow(key){
  if(!confirm('삭제하시겠습니까?'))return;
  ledgerRecords=ledgerRecords.filter(r=>!(r.type==='init'&&(r._initKey===key||r.name+r.date===key)));
  saveLedger();renderSavedInitStock();renderLedger();
}

function printLedger(){
  const selDate=document.getElementById('ledgerDate').value||getTodayISO2();
  const q=document.getElementById('ledgerSearch').value.trim().toLowerCase();
  const stor=document.getElementById('ledgerFilter').value;
  let ings=INGREDIENT_DB.filter(i=>{
    const qMatch=!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q);
    const sMatch=!stor||i.storage.includes(stor);
    return qMatch&&sMatch;
  });
  let bodyHtml='';
  ings.forEach(ing=>{
    const prevInit=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='init').reduce((s,r)=>s+r.qty,0);
    const prevIn=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='in'&&r.date<selDate).reduce((s,r)=>s+r.qty,0);
    const prevOut=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='out'&&r.date<selDate).reduce((s,r)=>s+r.qty,0);
    const prevStock=Math.max(0,prevInit+prevIn-prevOut);
    const monthIn=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='in'&&r.date===selDate).reduce((s,r)=>s+r.qty,0);
    const monthOut=ledgerRecords.filter(r=>r.name===ing.name&&r.type==='out'&&r.date===selDate).reduce((s,r)=>s+r.qty,0);
    const closing=Math.max(0,prevStock+monthIn-monthOut);
    bodyHtml+=`<tr>
      <td>${ing.code}</td>
      <td style="text-align:left;font-weight:600">${ing.name}</td>
      <td style="text-align:left">${ing.origin||'-'}</td>
      <td>${ing.storage||'-'}</td>
      <td>${ing.unit||'kg'}</td>
      <td>${prevStock>0?prevStock.toFixed(3):'-'}</td>
      <td>${monthIn>0?'+'+monthIn.toFixed(3):'-'}</td>
      <td>${monthOut>0?'-'+monthOut.toFixed(3):'-'}</td>
      <td style="font-weight:700">${closing>0?closing.toFixed(3):'0.000'}</td>
    </tr>`;
  });
  const printWin=window.open('','_blank');
  printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>원료수불부 ${selDate}</title>
  <style>
    body{font-family:"Noto Sans KR",sans-serif;font-size:10px;padding:20px;}
    h2{font-size:16px;margin-bottom:4px;}
    .sub{font-size:12px;color:#666;margin-bottom:14px;}
    table{width:100%;border-collapse:collapse;}
    th{background:#f0f0f0;border:1px solid #999;padding:5px;text-align:center;font-weight:700;}
    td{border:1px solid #999;padding:5px;text-align:center;}
    @page{margin:10mm;size:A4 landscape;}
  </style></head><body>
  <h2>원료수불부</h2>
  <div class="sub">조회일자: ${selDate} / 출력일시: ${new Date().toLocaleString('ko-KR')}</div>
  <table>
    <thead><tr><th>코드</th><th>품목명</th><th>원산지</th><th>보관기준</th><th>단위</th><th>전일재고</th><th>입고</th><th>출고</th><th>마감재고</th></tr></thead>
    <tbody>${bodyHtml}</tbody>
  </table>
  </body></html>`);
  printWin.document.close();
  setTimeout(()=>printWin.print(),500);
}

function openInModal(){
  document.getElementById('inIngName').value='';
  document.getElementById('inDate').value=getTodayISO2();
  document.getElementById('inQty').value='';
  document.getElementById('inLot').value='';
  document.getElementById('inExp').value='';
  document.getElementById('inModal').classList.add('open');
}
function saveIn(){
  const name=document.getElementById('inIngName').value.trim();
  const qty=parseFloat(document.getElementById('inQty').value)||0;
  const date=document.getElementById('inDate').value||getTodayISO2();
  const lot=document.getElementById('inLot').value.trim();
  const exp=document.getElementById('inExp').value;

initLedger();
document.getElementById('topbarDate').textContent=getToday();

</script>
