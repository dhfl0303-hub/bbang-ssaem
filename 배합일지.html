<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>생산 배합일지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--primary:#1a5fa8;--primary-light:#e8f0fb;--primary-dark:#0d3f75;--success:#1e9e6e;--success-light:#e6f5ef;--border:#e0e4ea;--bg:#f4f6fa;--bg2:#fff;--text:#1a1d23;--text2:#5a6070;--text3:#9aa0ad;--danger:#d63031;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);}

/* 상단바 */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--primary);height:56px;display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.back-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;cursor:pointer;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-main{color:#fff;font-size:18px;font-weight:700;}
.tb-batch{display:none;flex:1;align-items:center;gap:6px;overflow:hidden;min-width:0;}
.tb-name{color:#fff;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sep{color:rgba(255,255,255,0.4);font-size:13px;flex-shrink:0;}
.tb-code{color:rgba(255,255,255,0.75);font-size:12px;flex-shrink:0;}
.tb-num{color:#ffe066;font-size:14px;font-weight:700;flex-shrink:0;}

/* 공통 */
.content{padding-top:56px;min-height:100vh;}
.page{display:none;padding:16px;}
.page.active{display:block;}
.card{background:var(--bg2);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;}
.card-hd{padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text2);letter-spacing:0.3px;}
.card-bd{padding:14px;}
.sec{font-size:13px;font-weight:700;color:var(--text2);margin:14px 0 8px;letter-spacing:0.3px;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;cursor:pointer;font-family:"Noto Sans KR",sans-serif;font-weight:700;transition:all 0.15s;width:100%;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--primary);color:#fff;padding:16px;font-size:18px;}
.btn-success{background:var(--success);color:#fff;padding:16px;font-size:18px;}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);padding:14px;font-size:16px;}

/* 메인 */
.main-hd{background:var(--primary);padding:20px 16px 20px;margin:-16px -16px 16px;}
.main-date{color:rgba(255,255,255,0.75);font-size:15px;margin-bottom:4px;}
.main-worker{color:#fff;font-size:24px;font-weight:700;}
.main-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
.stat-box{background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 12px;}
.stat-lbl{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:3px;}
.stat-val{font-size:22px;font-weight:700;color:#fff;}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;}
.search-input{border:none;background:transparent;font-size:16px;font-family:"Noto Sans KR",sans-serif;flex:1;outline:none;color:var(--text);}
.product-list{display:flex;flex-direction:column;gap:8px;}
.product-item{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s;}
.product-item:active{background:var(--primary-light);border-color:var(--primary);}
.product-name{font-size:18px;font-weight:700;}
.product-code{font-size:13px;color:var(--text3);margin-top:2px;}

/* 배합 설정 */
.machine-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.machine-btn{padding:14px 8px;text-align:center;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;transition:all 0.15s;}
.machine-btn.active{border:2px solid var(--primary);background:var(--primary-light);}
.machine-btn.off{opacity:0.35;cursor:not-allowed;}
.machine-btn-name{font-size:18px;font-weight:700;color:var(--text);}
.machine-btn.active .machine-btn-name{color:var(--primary);}
.machine-btn-flour{font-size:18px;font-weight:700;color:var(--danger);margin-top:6px;}
.count-row{display:grid;grid-template-columns:1fr 70px;gap:10px;align-items:center;}
.count-input{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:12px;text-align:center;font-size:28px;font-weight:700;color:var(--primary);width:100%;outline:none;font-family:"Noto Sans KR",sans-serif;}
.count-input:focus{border-color:var(--primary);}
.count-btns{display:flex;flex-direction:column;gap:6px;}
.count-btn{height:40px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);font-size:22px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;}
.count-btn:active{background:var(--primary-light);}
.summary-box{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--primary-light);border-radius:10px;padding:12px;margin:12px 0;}
.sum-lbl{font-size:12px;color:var(--primary);font-weight:500;margin-bottom:3px;text-align:center;}
.sum-val{font-size:15px;font-weight:700;color:var(--primary-dark);text-align:center;}

/* 배합 입력 */
.progress-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
.pdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.pdot.done{background:var(--success-light);color:var(--success);border:1.5px solid var(--success);}
.pdot.active{background:var(--primary);color:#fff;}
.pdot.todo{background:var(--bg);color:var(--text3);border:1.5px solid var(--border);}
.lot-box{background:var(--primary-light);border:1px solid #b3cef0;border-radius:10px;padding:10px 14px;margin-bottom:12px;}
.lot-lbl{font-size:12px;color:var(--primary);font-weight:700;margin-bottom:3px;}
.lot-num{font-size:16px;font-weight:700;color:var(--primary-dark);}
.machine-mini{display:flex;gap:6px;margin-bottom:12px;}
.mm-btn{flex:1;padding:12px 4px;text-align:center;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all 0.15s;}
.mm-btn.active{border:2px solid var(--primary);background:var(--primary-light);color:var(--primary);font-weight:700;}
.mm-btn.off{opacity:0.35;cursor:not-allowed;}

/* 원료 블록 */
.ing-block{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.ing-hd{background:var(--bg);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.ing-name{font-size:17px;font-weight:700;}
.ing-total{font-size:15px;font-weight:700;color:var(--primary);}
.ing-col-hd{display:grid;grid-template-columns:1fr 1fr 36px;gap:6px;padding:5px 14px;border-top:1px solid var(--border);}
.col-lbl{font-size:13px;color:var(--text3);font-weight:500;}
.exp-row{display:grid;grid-template-columns:2fr 1fr 36px;gap:6px;padding:6px 14px;border-top:1px solid var(--border);align-items:stretch;}
.exp-row .del-btn{display:flex;align-items:center;justify-content:center;}
.exp-row.auto-row{background:var(--success-light);}
.exp-input{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:12px 10px;font-size:16px;font-family:"Noto Sans KR",sans-serif;color:var(--text);outline:none;width:100%;}
.exp-input:focus{border-color:var(--primary);}
.exp-input.readonly{background:var(--success-light);border-color:#7ec8a4;color:var(--success);font-weight:700;}
.exp-input.prev{border-color:var(--primary);background:var(--primary-light);}
.del-btn{width:34px;height:34px;border-radius:50%;background:#fff0f0;border:1px solid #fcc;color:var(--danger);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.add-exp-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;font-size:15px;color:var(--primary);border-top:1px dashed #b3cef0;background:var(--primary-light);cursor:pointer;font-weight:500;}

/* 완료 */
.done-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.done-item:last-child{border-bottom:none;}
.done-lot{font-size:14px;font-weight:700;color:var(--primary);}
.done-time{font-size:13px;color:var(--text3);}
.done-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--success-light);color:var(--success);}
.result-table{width:100%;border-collapse:collapse;font-size:14px;}
.result-table th{background:var(--bg);padding:8px 10px;font-size:12px;font-weight:700;color:var(--text2);text-align:left;border-bottom:1px solid var(--border);}
.result-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.result-table tr:last-child td{border-bottom:none;}
.complete-icon{width:70px;height:70px;border-radius:50%;background:var(--success-light);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:34px;}
.complete-title{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px;}
.complete-sub{text-align:center;font-size:14px;color:var(--text2);margin-bottom:20px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.mt-12{margin-top:12px;}
.tc{text-align:center;}
.txs{font-size:13px;color:var(--text2);}

/* 관리자 */
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;}
.admin-overlay.open{display:flex;}
.admin-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 40px;}
.admin-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.admin-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.tab-bar{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:16px;gap:4px;}
.tab-btn{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;}
.tab-btn.active{background:#fff;color:var(--primary);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.a-label{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.a-input{font-family:"Noto Sans KR",sans-serif;font-size:15px;color:var(--text);background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;width:100%;outline:none;margin-bottom:10px;}
.a-input:focus{border-color:var(--primary);background:#fff;}
.a-btn-row{display:flex;gap:8px;margin-top:10px;}
.a-btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:"Noto Sans KR",sans-serif;font-weight:700;font-size:15px;cursor:pointer;}
.a-save{background:var(--primary);color:#fff;}
.a-cancel{background:var(--bg);color:var(--text2);border:1px solid var(--border);}
.a-del{background:#fff0f0;color:var(--danger);border:1px solid #fcc;}
.log-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-lot{font-size:13px;font-weight:700;color:var(--primary);}
.log-time{font-size:12px;color:var(--text3);}
.log-del{background:#fff0f0;color:var(--danger);border:1px solid #fcc;padding:6px 12px;font-size:13px;border-radius:8px;cursor:pointer;font-weight:500;}

.print-area{display:none;}
.accordion-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.accordion-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:background 0.15s;}
.accordion-hd:active{background:var(--primary-light);}
.accordion-lot{font-size:14px;font-weight:700;color:var(--primary);}
.accordion-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.accordion-arrow{font-size:18px;color:var(--text3);transition:transform 0.2s;flex-shrink:0;}
.accordion-arrow.open{transform:rotate(180deg);}
.accordion-body{display:none;border-top:1px solid var(--border);padding:14px 16px;}
.accordion-body.open{display:block;}
.acc-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px;}
.acc-table th{background:var(--bg);padding:7px 10px;font-size:12px;font-weight:700;color:var(--text2);text-align:left;border-bottom:1px solid var(--border);}
.acc-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.acc-table tr:last-child td{border-bottom:none;}
.acc-print-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
@media print{body *{display:none!important;}.print-area{display:block!important;}.print-area *{display:revert!important;}@page{margin:10mm;size:A4 portrait;}}
</style>

<body>

<!-- 상단바 -->
<div class="topbar">
  <button class="back-btn" id="backBtn" style="display:none" onclick="goBack()">←</button>
  <div class="tb-main" id="tbMain">생산 배합일지</div>
  <div class="tb-batch" id="tbBatch">
    <span class="tb-name" id="tbName"></span>
    <span class="tb-sep">·</span>
    <span class="tb-code" id="tbCode"></span>
    <span class="tb-sep">·</span>
    <span class="tb-num" id="tbNum"></span>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button onclick="openAdmin()" style="background:rgba(255,255,255,0.2);color:#fff;border:1.5px solid rgba(255,255,255,0.5);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">⚙️ 설정</button>
    <button onclick="downloadRecipeDB()" style="background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.4);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-right:6px;">⬇️ 배합비</button><button id="syncBtn" onclick="syncToServer()" style="background:rgba(255,255,255,0.2);color:#fff;border:1.5px solid rgba(255,255,255,0.5);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">🔄 동기화</button>
  </div>
</div>

<div class="content">

  <!-- 메인 -->
  <div class="page active" id="page-main">
    <div class="main-hd">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="main-date" id="mainDate"></div>
          <div class="main-worker" id="mainWorker" onclick="openAdmin()" style="cursor:pointer;"></div>
        </div>
        
      </div>
      <div class="main-stats">
        <div class="stat-box"><div class="stat-lbl">오늘 완료 배합</div><div class="stat-val" id="statDone">0건</div></div>
        <div class="stat-box"><div class="stat-lbl">저장된 기록</div><div class="stat-val" id="statSaved">0건</div></div>
      </div>
    </div>
    <div class="sec">오늘 완료된 배합</div>
    <div class="card"><div class="card-bd" id="todayList"><div class="tc txs" style="padding:16px 0">오늘 완료된 배합이 없습니다</div></div></div>
    <div class="sec mt-12">제품 선택</div>
    <div class="search-box">
      <span style="color:var(--text3);font-size:18px">🔍</span>
      <input class="search-input" placeholder="제품명 검색..." id="searchInput" oninput="filterProducts()">
    </div>
    <div class="product-list" id="productList"></div>
  </div>

  <!-- 배합 설정 -->
  <div class="page" id="page-setup">
    <div class="card">
      <div class="card-hd">배합 선택</div>
      <div class="card-bd"><div class="machine-grid" id="machineGrid"></div></div>
    </div>
    <div class="card">
      <div class="card-hd">배합수</div>
      <div class="card-bd">
        <div class="count-row">
          <input class="count-input" type="number" id="countInput" value="1" min="1" max="30" oninput="onCountInput()">
          <div class="count-btns">
            <button class="count-btn" onclick="changeCount(1)">＋</button>
            <button class="count-btn" onclick="changeCount(-1)">－</button>
          </div>
        </div>
        <div class="summary-box">
          <div><div class="sum-lbl">기준 반죽량</div><div class="sum-val" id="sumBase">-</div></div>
          <div><div class="sum-lbl">배합수</div><div class="sum-val" id="sumCount">-</div></div>
          <div><div class="sum-lbl">총 반죽량</div><div class="sum-val" id="sumTotal">-</div></div>
        </div>
        <button class="btn btn-success" onclick="startBatching()">배합 시작 →</button>
      </div>
    </div>
  </div>

  <!-- 배합 입력 -->
  <div class="page" id="page-batch">
    <div class="progress-bar" id="progressBar"></div>
    <div class="lot-box"><div class="lot-lbl">완료 시 생성될 배합로트</div><div class="lot-num" id="currentLot">-</div></div>
    <div class="card">
      <div class="card-hd">이 배합</div>
      <div class="card-bd" style="padding-bottom:10px"><div class="machine-mini" id="machineMini"></div></div>
    </div>
    <div class="sec">원료 투입</div>
    <div id="ingredientList"></div>
    <button class="btn btn-primary mt-12" id="completeBatchBtn" onclick="completeBatch()">✓ 배합 완료 → 로트 생성</button>
  </div>

  <!-- 서명 -->
  <div class="page" id="page-sign">
    <div class="card">
      <div class="card-bd" style="padding:24px 16px;">
        <div class="complete-icon">✍️</div>
        <div class="complete-title">배합 완료</div>
        <div class="complete-sub">서명 후 최종 저장합니다</div>
        <div style="border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;">
          <div style="background:var(--bg);padding:8px 14px;font-size:12px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);">작성자 서명</div>
          <canvas id="signCanvas" style="width:100%;height:160px;display:block;cursor:crosshair;touch-action:none;background:#fff;"></canvas>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <button class="btn btn-outline" onclick="clearSign()" style="flex:1;padding:12px;font-size:14px;">🗑 지우기</button>
        </div>
        <button class="btn btn-success" onclick="completeWithSign()" style="margin-bottom:10px;">✅ 서명 완료 및 저장</button>
        <button class="btn btn-outline" onclick="completeWithSign()" style="font-size:14px;">서명 없이 저장</button>
      </div>
    </div>
  </div>

  <!-- 완료 -->
  <div class="page" id="page-done">
    <div class="card">
      <div class="card-bd" style="padding:24px 16px">
        <div class="complete-icon">✅</div>
        <div class="complete-title" id="doneTitle">배합 완료!</div>
        <div class="complete-sub" id="doneSub"></div>
        <div id="doneResult"></div>
        <div class="divider"></div>
        <button class="btn btn-primary" onclick="printReport()" style="margin-bottom:10px">🖨️ PDF 출력</button>

// 날짜
function getToday(){ const d=new Date(); return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일'; }
function getTodayKey(){ const d=new Date(); return String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
function getNow(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

// 설정
function loadSettings(){ return JSON.parse(localStorage.getItem('batchSettings')||'{"workerName":""}'); }
function loadWorkers(){ return JSON.parse(localStorage.getItem('workerList')||'[]'); }
function saveWorkers(list){ localStorage.setItem('workerList', JSON.stringify(list)); }

function renderWorkerSelect(){
  const workers = loadWorkers();
  const cur = loadSettings().workerName;
  const sel = document.getElementById('workerSelect');
  if(!sel) return;
  if(!workers.length){
    sel.innerHTML = '<option value="">아래에서 작업자 추가하세요</option>';
    return;
  }
  sel.innerHTML = '<option value="">작업자 선택</option>' +
    workers.map(w=>`<option value="${w}" ${w===cur?'selected':''}>${w}</option>`).join('') +
    '<option value="__del__">─ 삭제하기</option>';
}

function onWorkerSelect(){
  const sel = document.getElementById('workerSelect');
  if(sel.value === '__del__'){
    const workers = loadWorkers();
    if(!workers.length){ sel.value=''; return; }
    const target = prompt('삭제할 작업자: '+workers.join(', '));
    if(target && workers.includes(target)){
      saveWorkers(workers.filter(w=>w!==target));
      renderWorkerSelect();
    } else { renderWorkerSelect(); }
  }
}

function addWorker(){
  const name = document.getElementById('workerNewInput').value.trim();
  if(!name){ alert('이름을 입력해주세요'); return; }
  const workers = loadWorkers();
  if(workers.includes(name)){ alert('이미 등록된 작업자입니다'); return; }
  workers.push(name);
  saveWorkers(workers);
  document.getElementById('workerNewInput').value = '';
  renderWorkerSelect();
  document.getElementById('workerSelect').value = name;
}

function saveSettings(){
  const n = document.getElementById('workerSelect').value;
  if(!n || n==='__del__'){ alert('작업자를 선택해주세요'); return; }
  localStorage.setItem('batchSettings', JSON.stringify({workerName:n}));
  document.getElementById('mainWorker').textContent = n+' 작업자';
  closeAdmin(); alert('저장되었습니다');
}

function saveLocal(){ localStorage.setItem('batchRecords_'+getTodayKey(),JSON.stringify(S.todayRecords)); updateStats(); }
function loadLocal(){
  const d=localStorage.getItem('batchRecords_'+getTodayKey());
  if(d) S.todayRecords=JSON.parse(d);

}

// 페이지 전환
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  S.history.push(S.page); S.page=id;
  document.getElementById('backBtn').style.display = id==='main'?'none':'';
  // 상단바
  const isBatch = id==='batch';
  document.getElementById('tbMain').style.display = isBatch?'none':'';
  document.getElementById('tbBatch').style.display = isBatch?'flex':'none';
  window.scrollTo(0,0);
}
function goBack(){
  const prev=S.history.pop();
  if(!prev||prev==='main'){ goHome(); return; }
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+prev).classList.add('active');
  S.page=prev;
  document.getElementById('backBtn').style.display=prev==='main'?'none':'';
  document.getElementById('tbMain').style.display=prev==='batch'?'none':'';
  document.getElementById('tbBatch').style.display=prev==='batch'?'flex':'none';
}
function goHome(){
  S.history=[]; S.product=null; S.machine=null; S.batchRecords=[]; S.prevData={};
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-main').classList.add('active');
  S.page='main';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('tbMain').style.display='';
  document.getElementById('tbBatch').style.display='none';
  loadLocal();
}

function buildAccTable(batchRecords){
  const totals={};
  batchRecords.forEach(r=>r.ingredients.forEach(ing=>{
    if(!totals[ing.name])totals[ing.name]={};
    ing.exps.forEach(e=>{
      const key=e.lot||e.exp||'';
      if(!key) return;
      if(!totals[ing.name][key])totals[ing.name][key]={lot:e.lot||'',exp:e.exp||'',amt:0};
      totals[ing.name][key].amt+=e.amount||0;
    });
  }));
  const ingDB=JSON.parse(localStorage.getItem('customIngredients')||'[]');
  return `<table class="acc-table">
    <tr><th>원료코드</th><th>원료명</th><th>LOT</th><th>소비기한</th><th>총 사용량(g)</th></tr>
    ${Object.entries(totals).map(([n,keys])=>{
      const found=ingDB.find(i=>i.name===n)||{code:''};
      const code=found.code||INGREDIENT_DB_STATIC[n]||'';
      return Object.entries(keys).map(([k,v])=>
        `<tr><td style="color:var(--primary);font-weight:700">${code}</td><td>${n}</td><td>${v.lot||'-'}</td><td>${v.exp||'-'}</td><td>${Math.round(v.amt).toLocaleString()}</td></tr>`
      ).join('');
    }).join('')}
  </table>`;
}

// 제품 선택
function selectProduct(code){
  S.product=code; S.machine=null;
  const p=DB[code];
  document.getElementById('machineGrid').innerHTML=['1','2','3'].map(m=>{
    const md=p.batches[m];
    const off=!md?'off':'';
    let flour='';
    if(md){ const fi=md.ingredients.find(i=>FLOUR_NAMES.includes(i.name)); flour=fi?Number(fi.amount).toLocaleString()+'g':''; }
    const ingList = md ? md.ingredients.map(i=>
      '<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid #f0f0f0;">' +
      '<span style="color:#333;">'+i.name+'</span>' +
      '<span style="color:#666;font-weight:600;">'+Number(i.amount).toLocaleString()+'g</span></div>'
    ).join('') : '';
    const fn1 = md ? "selectMachine('"+m+"')" : '';
    return '<div class="machine-btn '+off+'" onclick="'+fn1+'" style="text-align:left;padding:14px;">' +
      '<div class="machine-btn-name" style="text-align:center;margin-bottom:4px;">배합'+m+'</div>' +
      '<div class="machine-btn-flour" style="text-align:center;margin-bottom:8px;">'+flour+'</div>' +
      '<div style="max-height:200px;overflow-y:auto;">'+ingList+'</div>' +
      '</div>';
  }).join('');
  document.getElementById('countInput').value=1;
  S.totalBatches=1;
  updateSummary();
  showPage('setup');
}
function selectMachine(m){
  S.machine=m;
  document.querySelectorAll('.machine-btn').forEach((el,i)=>el.classList.toggle('active',['1','2','3'][i]===m));
  updateSummary();
}
function changeCount(d){ const v=parseInt(document.getElementById('countInput').value||1)+d; if(v<1||v>30)return; document.getElementById('countInput').value=v; S.totalBatches=v; updateSummary(); }
function onCountInput(){ S.totalBatches=Math.max(1,Math.min(30,parseInt(document.getElementById('countInput').value)||1)); updateSummary(); }
function updateSummary(){
  const p=DB[S.product]; const m=S.machine;
  document.getElementById('sumCount').textContent=S.totalBatches+'회';
  if(m&&p.batches[m]){ const w=p.batches[m].weight; document.getElementById('sumBase').textContent=Number(w).toLocaleString()+'g'; document.getElementById('sumTotal').textContent=Number(w*S.totalBatches).toLocaleString()+'g'; }
  else{ document.getElementById('sumBase').textContent='-'; document.getElementById('sumTotal').textContent='-'; }
}
function startBatching(){
  if(!S.machine){ alert('배합을 선택해주세요'); return; }
  S.currentBatch=1; S.batchRecords=[]; S.prevData={};
  renderBatchPage(); showPage('batch');
}

// 배합 입력
function renderBatchPage(){
  const n=S.currentBatch, total=S.totalBatches;
  const p=DB[S.product]; const m=S.machine; const md=p.batches[m];
  const lot=`배합-${S.product}-${getTodayKey()}-${String(n).padStart(3,'0')}`;
  document.getElementById('currentLot').textContent=lot;
  document.getElementById('completeBatchBtn').textContent=`✓ ${n}배합 완료 → 로트 생성`;
  // 상단바 정보
  document.getElementById('tbName').textContent=p.name;
  document.getElementById('tbCode').textContent=S.product;
  document.getElementById('tbNum').textContent=`${n}/${total}배합`;
  // 진행도
  document.getElementById('progressBar').innerHTML=Array.from({length:total},(_,i)=>{
    const cls=i+1<n?'done':i+1===n?'active':'todo';
    return `<div class="pdot ${cls}">${i+1}</div>`;

// 소비기한 포맷 (260521 → 26.05.21)
function fmtExp(val){
  const d=val.replace(/\D/g,'').slice(0,6);
  if(d.length<=2) return d;
  if(d.length<=4) return d.slice(0,2)+'.'+d.slice(2);
  return d.slice(0,2)+'.'+d.slice(2,4)+'.'+d.slice(4);
}
function onExpInput(input){
  const raw=input.value.replace(/\D/g,'').slice(0,6);
  input.value=fmtExp(raw);
  updateAutoCalc(input.closest('.ing-block'));
}

// incomingRecords에서 원료별 LOT 목록 가져오기
function getIngLots(ingName){
  try{
    const recs=JSON.parse(localStorage.getItem('incomingRecords')||'[]');
    const lots=[];
    recs.forEach(rec=>{
      (rec.rows||[]).forEach(row=>{
        if(!row.product) return;
        // 원료명 매칭 (부분 포함 또는 동일)
        const recName=row.product.trim();
        const ingN=ingName.trim();
        if(recName===ingN||recName.includes(ingN)||ingN.includes(recName)){
          if(row.lot) lots.push({
            lot:row.lot,
            label:`${row.lot} (입고:${rec.date||''} 소비:${fmtExp(row.expVal||row.exp||'')})`,
            exp:fmtExp(row.expVal||row.exp||''),
            date:rec.date||''
          });
        }
      });
    });
    // 중복 제거
    const seen=new Set();
    return lots.filter(l=>{ if(seen.has(l.lot)) return false; seen.add(l.lot); return true; });
  }catch(e){ return []; }
}

// 소비기한 형식 통일 YY.MM.DD
function fmtExp(exp){
  if(!exp||exp==='-') return '-';
  const s=exp.replace(/\./g,'').replace(/-/g,'').trim();
  if(s.length===6) return `${s.slice(0,2)}.${s.slice(2,4)}.${s.slice(4,6)}`;
  return exp;
}

function delExpRow(btn){
  const block=btn.closest('.ing-block');
  const expRows=block.querySelector('.exp-rows');
  const rows=expRows.querySelectorAll('.exp-row');
  if(rows.length<=1) return;
  btn.closest('.exp-row').remove();
  const newRows=expRows.querySelectorAll('.exp-row');
  const last=newRows[newRows.length-1];
  last.classList.add('auto-row');
  const lastAmt=Array.from(last.querySelectorAll('input')).find(inp=>
    !inp.classList.contains('lot-manual-date')&&
    !inp.classList.contains('lot-manual-exp')&&
    !inp.classList.contains('lot-manual-full')
  );
  if(lastAmt){ lastAmt.setAttribute('readonly',''); lastAmt.placeholder='자동계산'; lastAmt.classList.add('readonly'); lastAmt.type='text'; }
  updateAutoCalc(block);
}

function updateAutoCalc(block){
  const total=parseInt(block.dataset.total);
  const rows=block.querySelector('.exp-rows').querySelectorAll('.exp-row');
  if(rows.length<=1) return;
  let used=0;
  rows.forEach((r,i)=>{
    if(i<rows.length-1){
      const amtInput=Array.from(r.querySelectorAll('input')).find(inp=>
        !inp.classList.contains('lot-manual-date')&&
        !inp.classList.contains('lot-manual-exp')&&
        !inp.classList.contains('lot-manual-full')&&
        inp.type==='number'
      );
      used+=parseFloat(amtInput?.value)||0;
    }
  });
  const lastRow=rows[rows.length-1];
  const lastAmt=Array.from(lastRow.querySelectorAll('input')).find(inp=>
    !inp.classList.contains('lot-manual-date')&&
    !inp.classList.contains('lot-manual-exp')&&
    !inp.classList.contains('lot-manual-full')
  );
  if(lastAmt) lastAmt.value=Math.max(0,Math.round(total-used));
}

function completeBatch(){
  const blocks=document.querySelectorAll('.ing-block'); const ingredients=[];
  blocks.forEach(block=>{
    const name=block.dataset.name; const total=parseInt(block.dataset.total);
    const rows=block.querySelectorAll('.exp-row'); const exps=[];
    rows.forEach(row=>{
      const sel=row.querySelector('select.lot-select');
      const manual=row.querySelector('.lot-manual-wrap');
      const amtInput=Array.from(row.querySelectorAll('input')).find(inp=>
        !inp.classList.contains('lot-manual-date')&&
        !inp.classList.contains('lot-manual-exp')&&
        !inp.classList.contains('lot-manual-full')
      );
      let lotVal='', expVal='';
      if(manual&&manual.style.display==='flex'){
        const hidden=row.querySelector('.lot-manual-full');
        lotVal=hidden?hidden.value.trim():'';
        const expInput=row.querySelector('.lot-manual-exp');
        expVal=expInput?fmtExp(expInput.value.trim()):'';
      } else if(sel){
        lotVal=sel.value.trim();
        expVal=sel.dataset.exp||sel.options[sel.selectedIndex]?.dataset.exp||'';
      }
      const av=amtInput?amtInput.value:'';
      if(lotVal) exps.push({lot:lotVal, exp:expVal, amount:parseFloat(av)||0});
    });
    if(!exps.length) exps.push({lot:'',exp:'',amount:total});
    ingredients.push({name,total,exps});
    S.prevData[name]=exps;
  });
  const lot=`배합-${S.product}-${getTodayKey()}-${String(S.currentBatch).padStart(3,'0')}`;
  const time=getNow();
  S.batchRecords.push({batchNum:S.currentBatch,machine:S.machine,lot,time,ingredients});
  saveLocal();
  if(S.currentBatch<S.totalBatches){ S.currentBatch++; renderBatchPage(); window.scrollTo(0,0); }
  else goSign();
}

// 원료수불부 출고 자동반영
function syncBatchToLedger(){
  try{
    let ledgerRecords=JSON.parse(localStorage.getItem('ledgerRecords')||'[]');
    const today=getTodayKey();
    const isoDate=`20${today.slice(0,2)}-${today.slice(2,4)}-${today.slice(4,6)}`;
    S.batchRecords.forEach(br=>{
      br.ingredients.forEach(ing=>{
        ing.exps.forEach(e=>{
          if(!e.amount) return;
          const exists=ledgerRecords.find(r=>r.type==='out'&&r.name===ing.name&&r.batchLot===br.lot&&r.exp===e.exp);
          if(!exists){
            const INGREDIENT_DB_LOCAL=JSON.parse(localStorage.getItem('customIngredients')||'[]');
            const dbIng=INGREDIENT_DB_LOCAL.find(i=>i.name===ing.name)||{code:''};
            ledgerRecords.push({
              date:isoDate, name:ing.name, code:dbIng.code||'',
              qty:e.amount/1000, // g→kg
              exp:e.exp||'', lot:e.lot||'', batchLot:br.lot, type:'out'
            });
          }
        });
      });
    });
    localStorage.setItem('ledgerRecords',JSON.stringify(ledgerRecords));
  }catch(err){ console.error('수불부 반영 오류',err); }
}

    <!-- 원료 사용 -->
    <table style="border-collapse:collapse;width:100%;font-size:10px;">
      <tr style="background:#e8f0fb">
        <th style="border:1px solid #999;padding:4px;text-align:center;width:8%">원료코드</th>
        <th style="border:1px solid #999;padding:4px;text-align:left;width:20%">원료명</th>
        <th style="border:1px solid #999;padding:4px;text-align:center;width:42%">LOT</th>
        <th style="border:1px solid #999;padding:4px;text-align:center;width:15%">소비기한</th>
        <th style="border:1px solid #999;padding:4px;text-align:right;width:15%">총 사용량(g)</th>
      </tr>
      ${Object.entries(totals).map(([n,keys])=>{
        const ingDB=JSON.parse(localStorage.getItem('customIngredients')||'[]');
        const found=ingDB.find(i=>i.name===n)||{code:''};
        const code=found.code||INGREDIENT_DB_STATIC[n]||'';
        return Object.entries(keys).map(([k,v])=>`<tr>
          <td style="border:1px solid #999;padding:4px;text-align:center;color:#1a5fa8;font-weight:700">${code}</td>
          <td style="border:1px solid #999;padding:4px">${n}</td>
          <td style="border:1px solid #999;padding:4px;text-align:center">${v.lot||k||'-'}</td>
          <td style="border:1px solid #999;padding:4px;text-align:center">${fmtExp(v.exp)}</td>
          <td style="border:1px solid #999;padding:4px;text-align:right">${Math.round(v.amt).toLocaleString()}</td>
        </tr>`).join('');
      }).join('')}
    </table>
  </div>`;
}

// 서명 캔버스
let signCtx=null, signing=false, hasSign=false, signImg='';

function initCanvas(){
  const canvas=document.getElementById('signCanvas');
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*window.devicePixelRatio;
  canvas.height=rect.height*window.devicePixelRatio;
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  signCtx=canvas.getContext('2d');
  signCtx.scale(window.devicePixelRatio,window.devicePixelRatio);
  signCtx.strokeStyle='#1a1d23';
  signCtx.lineWidth=2.5;
  signCtx.lineCap='round';
  signCtx.lineJoin='round';
  hasSign=false;
  canvas.addEventListener('touchstart',e=>{e.preventDefault();signing=true;hasSign=true;const t=e.touches[0];const r=canvas.getBoundingClientRect();signCtx.beginPath();signCtx.moveTo(t.clientX-r.left,t.clientY-r.top);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!signing)return;const t=e.touches[0];const r=canvas.getBoundingClientRect();signCtx.lineTo(t.clientX-r.left,t.clientY-r.top);signCtx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>{signing=false;});
  canvas.addEventListener('mousedown',e=>{signing=true;hasSign=true;const r=canvas.getBoundingClientRect();signCtx.beginPath();signCtx.moveTo(e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mousemove',e=>{if(!signing)return;const r=canvas.getBoundingClientRect();signCtx.lineTo(e.clientX-r.left,e.clientY-r.top);signCtx.stroke();});
  canvas.addEventListener('mouseup',()=>{signing=false;});
}
function clearSign(){const canvas=document.getElementById('signCanvas');signCtx.clearRect(0,0,canvas.width,canvas.height);hasSign=false;}
function goSign(){showPage('sign');setTimeout(initCanvas,100);}
function completeWithSign(){signImg=hasSign?document.getElementById('signCanvas').toDataURL('image/png'):'';showComplete();}

// ===== 동기화 =====
async function syncToServer(){
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⏳ 동기화 중...';
  btn.disabled = true;
  try {
    if(!window._db) throw new Error('Firebase 연결 없음');
    const db = window._db;

    // 1. localStorage의 모든 배합 기록 수집
    const keys = Object.keys(localStorage).filter(k=>k.startsWith('batchRecords_'));
    let recs = []; keys.forEach(k=>{ recs = recs.concat(JSON.parse(localStorage.getItem(k)||'[]')); });
    if(!recs.length){ btn.textContent='⚠️ 데이터 없음'; setTimeout(()=>{btn.textContent='🔄 동기화';btn.disabled=false;},2000); return; }

    // 2. 배합기록 Firebase 업로드 (날짜별 키로 저장)
    for(const key of keys){
      const dayRecs = JSON.parse(localStorage.getItem(key)||'[]');
      if(dayRecs.length){
        await db.collection('appData').doc(key).set({ data: JSON.stringify(dayRecs), updatedAt: new Date().toISOString() });
      }
    }

    // 3. 원료수불부 출고 반영 (ledgerRecords Firebase 업데이트)
    let ledgerSnap = await db.collection('appData').doc('ledgerRecords').get();
    let ledgerRecords = (ledgerSnap.exists && ledgerSnap.data().data) ? JSON.parse(ledgerSnap.data().data) : [];
    recs.forEach(rec=>{
      (rec.batchRecords||[]).forEach(br=>{
        br.ingredients.forEach(ing=>{
          (ing.exps||[ing]).forEach(e=>{
            const exists = ledgerRecords.find(r=>r.type==='out'&&r.name===ing.name&&r.batchLot===br.lot&&r.exp===e.exp);
            if(!exists){
              const code = INGREDIENT_DB_STATIC[ing.name]||'';
              ledgerRecords.push({ date:rec.date||getTodayKey(), name:ing.name, code, qty:(e.qty||ing.amount||0)/1000, lot:e.lot||'', exp:e.exp||'', batchLot:br.lot, type:'out' });
            }
          });
        });
      });
    });
    await db.collection('appData').doc('ledgerRecords').set({ data: JSON.stringify(ledgerRecords), updatedAt: new Date().toISOString() });

    // 4. 배합비(recipeDB) Firebase 업로드
    await db.collection('appData').doc('recipeDB').set({ data: JSON.stringify(DB), updatedAt: new Date().toISOString() });

    btn.textContent = '✅ '+recs.length+'건 완료';
    setTimeout(()=>{ btn.textContent='🔄 동기화'; btn.disabled=false; }, 2500);
  } catch(e) {
    console.error('동기화 실패', e);
    btn.textContent = '❌ 실패';
    setTimeout(()=>{ btn.textContent='🔄 동기화'; btn.disabled=false; }, 2000);
  }
}

// 배합비 Firebase에서 다운로드
async function downloadRecipeDB(){
  if(!window._db){ alert('인터넷 연결을 확인해주세요'); return; }
  try{
    const snap = await window._db.collection('appData').doc('recipeDB').get();
    if(snap.exists && snap.data().data){
      DB = JSON.parse(snap.data().data);
      localStorage.setItem('recipeDB', JSON.stringify(DB));
      renderProductList(Object.keys(DB));
      alert('배합비 다운로드 완료!');
    } else {
      alert('Firebase에 저장된 배합비가 없습니다');
    }
  }catch(e){ alert('다운로드 실패: 네트워크를 확인해주세요'); }
}
