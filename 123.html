<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소모품 지급 관리표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#16232a;
    --ink-sub:#64777c;
    --paper:#f2f6f6;
    --surface:#ffffff;
    --line:#dbe6e5;
    --teal:#0d6e64;
    --teal-deep:#0a4a44;
    --teal-tint:#e3f3ef;
    --amber:#c9832f;
    --amber-tint:#faf0e0;
    --danger:#bd4438;
    --danger-tint:#fbeae7;
    --off:#c7d1d0;

    /* 하위호환용 별칭 (기존 규칙에서 사용) */
    --navy:var(--teal-deep);
    --navy-dark:var(--teal-deep);
    --teal-light:var(--teal-tint);
    --gray-bg:var(--paper);
    --gray-border:var(--line);
    --text:var(--ink);
    --text-sub:var(--ink-sub);
    --ok:var(--teal);
    --warn:var(--amber);

    --font-display:'IBM Plex Sans KR','Pretendard',sans-serif;
    --font-body:'Pretendard','IBM Plex Sans KR',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:
      radial-gradient(circle at 1px 1px, rgba(13,110,100,0.06) 1px, transparent 0) 0 0/16px 16px,
      var(--paper);
    color:var(--ink);
    padding-bottom:60px;
  }
  header{
    position:relative;
    overflow:hidden;
    background:linear-gradient(120deg, var(--teal-deep) 0%, var(--teal) 78%);
    color:#fff;
    padding:20px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  header::after{
    content:'';
    position:absolute;
    top:0; right:0; bottom:0;
    width:130px;
    background:repeating-linear-gradient(
      -45deg,
      rgba(255,255,255,0.09) 0 10px,
      rgba(255,255,255,0) 10px 20px
    );
    pointer-events:none;
  }
  header .title-row{
    display:flex;
    align-items:center;
    gap:10px;
    position:relative;
    z-index:1;
  }
  header .title-row svg{
    flex:none;
    width:26px;height:26px;
    stroke:#fff;
  }
  header h1{
    font-family:var(--font-display);
    font-size:19px;
    margin:0;
    font-weight:700;
    letter-spacing:-0.2px;
  }
  header .status{
    position:relative;
    z-index:1;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:#d3ede8;
    background:rgba(255,255,255,0.12);
    padding:5px 10px;
    border-radius:20px;
  }
  .toolbar{
    display:flex;
    gap:8px;
    padding:14px 24px;
    background:var(--surface);
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
    align-items:center;
  }
  button{
    font-family:var(--font-display);
    cursor:pointer;
    border:none;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    padding:9px 16px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }
  button svg{width:14px;height:14px;flex:none;}
  button:hover{transform:translateY(-1px);}
  button:active{transform:translateY(0);opacity:.85;}
  .btn-primary{background:linear-gradient(120deg, var(--teal-deep), var(--teal));color:#fff;box-shadow:0 3px 10px rgba(10,74,68,.28);}
  .btn-teal{background:var(--teal);color:#fff;box-shadow:0 3px 10px rgba(13,110,100,.25);}
  .btn-danger{background:var(--danger);color:#fff;box-shadow:0 3px 10px rgba(189,68,56,.22);}
  .btn-gray{background:#eef2f2;color:var(--ink);}
  .table-wrap{
    margin:18px 24px;
    background:var(--surface);
    border-radius:14px;
    overflow-x:auto;
    border:1px solid var(--line);
    box-shadow:0 10px 28px -18px rgba(10,50,46,.35);
  }
  table{
    border-collapse:collapse;
    width:100%;
    min-width:780px;
  }
  th,td{
    border:1px solid var(--line);
    text-align:center;
    padding:0;
    font-size:13px;
  }
  thead th{
    background:linear-gradient(180deg, var(--teal-deep), var(--teal));
    color:#fff;
    padding:12px 6px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:12.5px;
    letter-spacing:.3px;
    position:sticky;
    top:0;
  }
  thead th .th-inner{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  thead th svg{
    width:17px;height:17px;
    stroke:#e8f6f3;
    opacity:.9;
  }
  thead th:first-child{
    min-width:120px;
    text-align:left;
  }
  thead th:first-child .th-inner{
    align-items:flex-start;
  }
  tbody tr:nth-child(4n+1):not(.accordion-row) td{
    background:#fafcfc;
  }
  tbody tr:not(.accordion-row):hover td{
    background:var(--teal-tint);
  }
  tbody td:first-child{
    font-family:var(--font-display);
    font-weight:600;
    padding:11px 12px;
    cursor:pointer;
    color:var(--teal-deep);
    position:relative;
    transition:background .15s;
  }
  tbody td:first-child::before{
    content:'';
    position:absolute;
    left:0;top:0;bottom:0;
    width:3px;
    background:transparent;
    transition:background .15s;
  }
  tbody tr:hover td:first-child::before,
  tbody tr.expanded td:first-child::before{
    background:var(--teal);
  }
  .del-emp{
    display:inline-block;
    margin-left:6px;
    color:var(--danger);
    font-size:11px;
    text-decoration:none;
    cursor:pointer;
  }
  .cell-btn{
    width:100%;
    height:100%;
    min-height:60px;
    background:none;
    border-radius:0;
    padding:8px 4px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:5px;
    box-shadow:none;
  }
  .cell-btn:hover{transform:none;}
  .cell-btn .mark{
    width:20px;
    height:20px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    line-height:1;
    color:transparent;
    border:1.6px dashed var(--off);
    background:transparent;
  }
  .cell-btn.issued .mark{
    color:#fff;
    font-weight:700;
    border:1.6px solid var(--teal);
    background:var(--teal);
    box-shadow:0 2px 6px rgba(13,110,100,.35);
  }
  .cell-btn .date{
    font-family:var(--font-mono);
    font-size:10.5px;
    font-weight:500;
    color:var(--ink-sub);
  }
  .cell-btn.issued .date{
    color:var(--teal-deep);
    font-weight:600;
  }
  .cell-btn.issued{
    background:linear-gradient(180deg, var(--teal-tint), #ffffff);
  }
  .cell-btn:hover{
    background:var(--teal-tint);
  }
  .empty-row td{
    padding:36px;
    color:var(--ink-sub);
    font-size:13px;
    font-family:var(--font-body);
  }
  /* modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(10,28,26,0.5);
    backdrop-filter:blur(2px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:16px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--surface);
    border-radius:16px;
    width:100%;
    max-width:440px;
    max-height:86vh;
    overflow-y:auto;
    padding:0;
    box-shadow:0 24px 60px -20px rgba(6,30,28,.45);
    animation:modalPop .16s ease;
  }
  @keyframes modalPop{
    from{opacity:0; transform:translateY(6px) scale(.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .modal-head{
    background:linear-gradient(120deg, var(--teal-deep), var(--teal));
    color:#fff;
    padding:16px 20px;
    font-family:var(--font-display);
    font-size:15px;
    font-weight:700;
    border-radius:16px 16px 0 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .modal-head .x{
    cursor:pointer;
    font-size:20px;
    line-height:1;
    opacity:.85;
    transition:opacity .12s;
  }
  .modal-head .x:hover{opacity:1;}
  .modal-body{
    padding:20px;
  }
  .modal-body label{
    display:block;
    font-family:var(--font-display);
    font-size:11.5px;
    font-weight:600;
    color:var(--ink-sub);
    margin-bottom:6px;
    letter-spacing:.2px;
  }
  .modal-body input[type=text]{
    width:100%;
    padding:10px 12px;
    border:1.4px solid var(--line);
    border-radius:8px;
    font-size:14px;
    font-family:var(--font-mono);
    margin-bottom:14px;
    transition:border-color .12s;
  }
  .modal-body input[type=text]:focus{
    outline:none;
    border-color:var(--teal);
  }
  .modal-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
  }
  .history-list{
    list-style:none;
    margin:0 0 14px 0;
    padding:0;
    border-top:1px solid var(--line);
  }
  .history-list li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 2px;
    border-bottom:1px solid var(--line);
    font-size:13px;
    font-family:var(--font-mono);
  }
  .history-list li .del-record{
    color:var(--danger);
    cursor:pointer;
    font-size:12px;
    font-family:var(--font-body);
  }
  .history-list .none{
    color:var(--ink-sub);
    padding:12px 2px;
    text-align:center;
    border-bottom:none;
    font-family:var(--font-body);
  }
  .section-title{
    font-family:var(--font-display);
    font-size:12.5px;
    font-weight:700;
    color:var(--teal-deep);
    margin:16px 0 8px;
    text-transform:uppercase;
    letter-spacing:.4px;
  }
  .emp-history-block{margin-bottom:14px;}
  .emp-history-block h4{
    margin:0 0 6px;
    font-size:13px;
    color:var(--teal);
  }
  .hint{
    font-size:11px;
    color:var(--ink-sub);
    margin:-8px 0 14px;
  }
  .lock-overlay{
    position:fixed;inset:0;
    background:rgba(255,255,255,0.6);
    display:none;
    align-items:center;justify-content:center;
    z-index:200;
    font-size:13px;
    color:var(--teal-deep);
    font-weight:600;
  }
  .lock-overlay.show{display:flex;}

  /* 직원명 옆 사이즈 배지 */
  .size-badge{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:10px;
    font-weight:600;
    color:var(--teal-deep);
    background:var(--teal-tint);
    border-radius:4px;
    padding:2px 6px;
    margin-left:4px;
    vertical-align:middle;
  }

  /* 아코디언 행 */
  @keyframes accFadeIn{
    from{opacity:0;}
    to{opacity:1;}
  }
  .accordion-row td{
    padding:0;
    background:linear-gradient(180deg, var(--teal-tint) 0%, #f8fbfb 60px, #f8fbfb 100%);
    text-align:left;
    border-left:3px solid var(--teal);
    animation:accFadeIn .18s ease;
  }
  .accordion-inner{
    padding:16px 20px 18px;
  }
  .acc-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    padding-bottom:14px;
    margin-bottom:14px;
    border-bottom:1px dashed var(--line);
  }
  .acc-sizes{
    font-size:12.5px;
    color:var(--ink);
    display:flex;
    gap:16px;
    align-items:center;
    flex-wrap:wrap;
  }
  .acc-sizes b{
    color:var(--teal-deep);
    font-family:var(--font-display);
    font-weight:600;
    margin-right:3px;
  }
  .acc-sizes span{font-family:var(--font-mono);}
  .acc-sizes .size-edit-row{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .acc-sizes input[type=text]{
    width:70px;
    padding:5px 7px;
    border:1px solid var(--line);
    border-radius:4px;
    font-size:12.5px;
  }
  .acc-actions{
    display:flex;
    gap:6px;
  }
  .acc-actions button{
    font-size:12px;
    padding:6px 12px;
  }
  .acc-items{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:12px;
  }
  .acc-item-block{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 13px;
    transition:box-shadow .12s, border-color .12s;
  }
  .acc-item-block:hover{
    border-color:var(--teal);
    box-shadow:0 4px 14px -8px rgba(13,110,100,.4);
  }
  .acc-item-block h5{
    margin:0 0 8px;
    font-family:var(--font-display);
    font-size:12.5px;
    font-weight:600;
    color:var(--teal-deep);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .acc-item-block h5 .size-badge{margin-left:0;}
  .acc-item-block ul{
    list-style:none;
    margin:0;
    padding:0;
  }
  .acc-item-block li{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--ink-sub);
    padding:2px 0;
  }
  .acc-item-block .none{
    font-size:12px;
    font-family:var(--font-body);
    color:#b3b9bf;
  }

  /* 사이즈 드롭다운 + 직접입력 */
  .size-select-row{
    display:inline-flex;
    gap:6px;
    align-items:center;
    margin-bottom:14px;
  }
  .size-select-row select{
    padding:8px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:13px;
    font-family:var(--font-body);
    background:#fff;
  }
  .size-select-row input[type=text]{
    width:80px;
    padding:8px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:13px;
    font-family:var(--font-mono);
    margin-bottom:0 !important;
  }
  .acc-sizes .size-select-row{
    margin-bottom:0;
  }
  .acc-sizes .size-select-row select{
    padding:5px 6px;
    font-size:12px;
  }
  .acc-sizes .size-select-row input[type=text]{
    width:60px;
    padding:5px 6px;
    font-size:12px;
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6l1 3H8l1-3z"/><path d="M6 6h12l1.2 13.2a2 2 0 0 1-2 2.1H6.8a2 2 0 0 1-2-2.1L6 6z"/><path d="M9 11c1 1 5 1 6 0"/></svg>
    <h1>소모품 지급 관리표</h1>
  </div>
  <div class="status" id="statusText">Firebase 연결 확인 중...</div>
</header>

<div class="toolbar">
  <button class="btn-primary" onclick="openAddEmployeeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>신규 직원 등록</button>
  <button class="btn-gray" onclick="loadData()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 4v5h-5"/></svg>새로고침</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th><div class="th-inner">직원명</div></th>
        <th><div class="th-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16c0-5 3.5-9 8-9s8 4 8 9"/><path d="M3 16h18"/><path d="M9 7.5c1-1.2 5-1.2 6 0"/></svg>위생모</div></th>
        <th><div class="th-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3 6 6 3 9l3 2v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-9l3-2-3-3-3-3-1 2h-4l-1-2z"/></svg>위생복</div></th>
        <th><div class="th-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19v-6c2-1 3-3 3-5V6h4v6l6 2c2 .6 3 1.5 3 3v2z"/></svg>위생화</div></th>
        <th><div class="th-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5h12l1 4-3 2v10a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V11L5 9l1-4z"/><path d="M9 5c1 2 5 2 6 0"/></svg>앞치마</div></th>
        <th><div class="th-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="4" width="8" height="16" rx="3"/><path d="M8 9h8M8 14h8"/></svg>토시</div></th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr class="empty-row"><td colspan="6">불러오는 중...</td></tr>
    </tbody>
  </table>
</div>

<!-- 신규 직원 등록 모달 -->
<div class="overlay" id="addEmpOverlay">
  <div class="modal">
    <div class="modal-head">
      <span>신규 직원 등록</span>
      <span class="x" onclick="closeModal('addEmpOverlay')">&times;</span>
    </div>
    <div class="modal-body">
      <label>직원 성명</label>
      <input type="text" id="newEmpName" placeholder="예: 홍길동">
      <label>위생복 상의 사이즈 (선택)</label>
      <div id="newEmpTopSizeWrap"></div>
      <label>위생복 하의 사이즈 (선택)</label>
      <div id="newEmpBottomSizeWrap"></div>
      <label>위생화 사이즈 (선택)</label>
      <div id="newEmpShoeSizeWrap"></div>
      <div class="modal-actions">
        <button class="btn-gray" onclick="closeModal('addEmpOverlay')">취소</button>
        <button class="btn-primary" onclick="addEmployee()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- 품목별 지급 등록/이력 모달 -->
<div class="overlay" id="itemOverlay">
  <div class="modal">
    <div class="modal-head">
      <span id="itemModalTitle">지급 이력</span>
      <span class="x" onclick="closeModal('itemOverlay')">&times;</span>
    </div>
    <div class="modal-body">
      <div class="section-title">신규 지급 등록</div>
      <label>지급일자 (6자리 숫자, 예: 260713 → 26.07.13)</label>
      <input type="text" id="newDateInput" maxlength="6" placeholder="260713" oninput="formatDateInput(this)">
      <div class="hint">YY MM DD 순서로 6자리 입력 시 자동으로 00.00.00 형식 표시됩니다.</div>
      <div class="modal-actions" style="margin-bottom:16px;">
        <button class="btn-teal" onclick="addRecord()">지급 등록</button>
      </div>
      <div class="section-title">지급 이력</div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>
</div>

<div class="lock-overlay" id="lockOverlay">저장 중...</div>

<script>
/* =========================================================
   설정 및 기본 데이터 구조
   ========================================================= */
const ITEMS = ['위생모','위생복','위생화','앞치마','토시'];
const DOC_PATH = { collection:'appData', doc:'consumableSupply' };
const BACKUP_KEY = 'backup_consumableSupply';
const SIZE_PRESETS = ['S','M','L','XL','XXL','XXXL'];

// TODO: 실제 프로젝트(bbang-ssaem-prod)의 firebaseConfig 값으로 교체하세요.
// 기존 원료수불부.html / 통합관리.html 에서 사용 중인 설정과 동일한 값을 넣으면 됩니다.
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "bbang-ssaem-prod.firebaseapp.com",
  projectId: "bbang-ssaem-prod",
  storageBucket: "bbang-ssaem-prod.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let db = null;
let fbLoadFailed = false;
let appData = { employees: [], records: {} }; // records[empId][item] = [ '260713', ... ]
let currentItemCtx = null; // {empId, item}
let expandedEmpId = null;  // 아코디언으로 펼쳐진 직원 id
let editingSizesEmpId = null; // 사이즈 수정 중인 직원 id

/* =========================================================
   Firebase 초기화 및 로드 (기존 MES 파일 패턴: 3초 타임아웃, 백업 fallback)
   ========================================================= */
function initFirebase(){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }catch(e){
    console.error('Firebase 초기화 실패', e);
    fbLoadFailed = true;
  }
}

function setStatus(text, ok){
  const el = document.getElementById('statusText');
  el.textContent = text;
  el.style.color = ok === false ? '#ffb4b4' : (ok === true ? '#b6e6c9' : '#cfe0f0');
}

async function loadData(){
  setStatus('데이터 불러오는 중...');
  const forceUnlock = setTimeout(()=>{ hideLock(); }, 10000);
  try{
    if(!db) throw new Error('Firestore 미초기화');
    const docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
    const snap = await Promise.race([
      docRef.get(),
      new Promise((_, reject)=> setTimeout(()=> reject(new Error('timeout')), 3000))
    ]);
    if(snap.exists){
      const d = snap.data();
      appData = {
        employees: Array.isArray(d.employees) ? d.employees : [],
        records: d.records && typeof d.records === 'object' ? d.records : {}
      };
    } else {
      appData = { employees: [], records: {} };
    }
    fbLoadFailed = false;
    localStorage.setItem(BACKUP_KEY, JSON.stringify(appData));
    setStatus('Firebase 연결됨 · 정상 동기화', true);
  }catch(e){
    console.error('Firebase 로드 실패, 로컬 백업 사용', e);
    fbLoadFailed = true;
    const backup = localStorage.getItem(BACKUP_KEY);
    if(backup){
      try{ appData = JSON.parse(backup); }
      catch(_e){ appData = { employees: [], records: {} }; }
      setStatus('⚠ Firebase 연결 실패 · 로컬 백업 데이터 표시 중 (저장 제한됨)', false);
    } else {
      appData = { employees: [], records: {} };
      setStatus('⚠ Firebase 연결 실패 · 백업 데이터 없음', false);
    }
  }finally{
    clearTimeout(forceUnlock);
    render();
  }
}

async function saveData(){
  // 항상 로컬 백업 먼저 저장 (Firebase 실패 대비 가드)
  localStorage.setItem(BACKUP_KEY, JSON.stringify(appData));

  if(fbLoadFailed){
    alert('Firebase 로드에 실패한 상태라 서버 저장이 제한됩니다.\n로컬에는 임시 저장되었습니다. 새로고침 후 다시 시도해주세요.');
    return;
  }
  showLock();
  const forceUnlock = setTimeout(()=>{ hideLock(); }, 10000);
  try{
    const docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
    await Promise.race([
      docRef.set(appData),
      new Promise((_, reject)=> setTimeout(()=> reject(new Error('timeout')), 3000))
    ]);
    setStatus('Firebase 연결됨 · 저장 완료', true);
  }catch(e){
    console.error('저장 실패', e);
    alert('서버 저장에 실패했습니다. (로컬에는 백업됨)\n' + e.message);
    setStatus('⚠ 저장 실패 · 로컬 백업만 유지 중', false);
  }finally{
    clearTimeout(forceUnlock);
    hideLock();
  }
}

function showLock(){ document.getElementById('lockOverlay').classList.add('show'); }
function hideLock(){ document.getElementById('lockOverlay').classList.remove('show'); }

/* =========================================================
   렌더링
   ========================================================= */
function render(){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if(!appData.employees || appData.employees.length === 0){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">등록된 직원이 없습니다. 상단의 "신규 직원 등록" 버튼을 눌러주세요.</td></tr>';
    return;
  }

  appData.employees.forEach(emp=>{
    const tr = document.createElement('tr');
    if(expandedEmpId === emp.id) tr.className = 'expanded';

    const nameTd = document.createElement('td');
    nameTd.textContent = emp.name;
    nameTd.onclick = ()=> toggleAccordion(emp.id);
    tr.appendChild(nameTd);

    ITEMS.forEach(item=>{
      const td = document.createElement('td');
      const records = getRecords(emp.id, item);
      const latest = records.length ? records[records.length-1] : null;

      const btn = document.createElement('button');
      btn.className = 'cell-btn' + (latest ? ' issued' : '');
      btn.onclick = ()=> openItemModal(emp.id, item);

      const mark = document.createElement('div');
      mark.className = 'mark';
      mark.textContent = latest ? '✔' : '☐';
      btn.appendChild(mark);

      if(latest){
        const dateDiv = document.createElement('div');
        dateDiv.className = 'date';
        dateDiv.textContent = formatDisplayDate(latest);
        btn.appendChild(dateDiv);
      }

      td.appendChild(btn);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);

    if(expandedEmpId === emp.id){
      tbody.appendChild(buildAccordionRow(emp));
    }
  });
}

function getSizes(emp){
  const s = emp.sizes || {};
  // 이전 버전(위생복 단일값) 데이터 호환: 위생복 값이 있으면 상의로 이관
  return {
    상의: s.상의 || s.위생복 || '',
    하의: s.하의 || '',
    위생화: s.위생화 || ''
  };
}

/* 사이즈 드롭다운(S~XXXL) + 직접입력 컴포넌트 */
function sizeSelectorHtml(selectId, inputId, currentValue){
  const val = currentValue || '';
  const isPreset = SIZE_PRESETS.includes(val);
  const selectVal = isPreset ? val : (val ? '__custom__' : '');
  const showInput = selectVal === '__custom__';

  let options = '<option value="">선택 안함</option>';
  SIZE_PRESETS.forEach(p=>{
    options += `<option value="${p}" ${selectVal===p ? 'selected' : ''}>${p}</option>`;
  });
  options += `<option value="__custom__" ${selectVal==='__custom__' ? 'selected' : ''}>직접입력(숫자)</option>`;

  return `<div class="size-select-row">
      <select id="${selectId}" onchange="onSizeSelectChange('${selectId}','${inputId}')">${options}</select>
      <input type="text" id="${inputId}" placeholder="예: 95" value="${escapeHtml(showInput ? val : '')}" style="display:${showInput ? 'inline-block' : 'none'}">
    </div>`;
}

function onSizeSelectChange(selectId, inputId){
  const select = document.getElementById(selectId);
  const input = document.getElementById(inputId);
  if(select.value === '__custom__'){
    input.style.display = 'inline-block';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = '';
  }
}

function readSizeSelector(selectId, inputId){
  const select = document.getElementById(selectId);
  const input = document.getElementById(inputId);
  if(!select) return '';
  if(select.value === '__custom__') return input.value.trim();
  return select.value;
}

/* 위생화 사이즈: 드롭다운 없이 숫자만 직접 입력 */
function numberSizeInputHtml(inputId, currentValue){
  const val = currentValue || '';
  return `<input type="text" id="${inputId}" inputmode="numeric" maxlength="4" placeholder="예: 270" value="${escapeHtml(val)}" oninput="this.value=this.value.replace(/[^0-9]/g,'')">`;
}

function buildAccordionRow(emp){
  const tr = document.createElement('tr');
  tr.className = 'accordion-row';

  const td = document.createElement('td');
  td.colSpan = 6;

  const inner = document.createElement('div');
  inner.className = 'accordion-inner';

  /* ---- 상단: 사이즈 + 액션 ---- */
  const head = document.createElement('div');
  head.className = 'acc-head';

  const sizesWrap = document.createElement('div');
  sizesWrap.className = 'acc-sizes';

  if(editingSizesEmpId === emp.id){
    const sizes = getSizes(emp);
    sizesWrap.innerHTML = `
      <span>상의 ${sizeSelectorHtml('editTopSize','editTopSizeCustom', sizes.상의)}</span>
      <span>하의 ${sizeSelectorHtml('editBottomSize','editBottomSizeCustom', sizes.하의)}</span>
      <span>위생화 ${numberSizeInputHtml('editShoeSize', sizes.위생화)}</span>
    `;
  } else {
    const sizes = getSizes(emp);
    const top = sizes.상의 ? sizes.상의 : '미등록';
    const bottom = sizes.하의 ? sizes.하의 : '미등록';
    const shoe = sizes.위생화 ? sizes.위생화 : '미등록';
    sizesWrap.innerHTML = `<span><b>상의</b> ${escapeHtml(top)}</span><span><b>하의</b> ${escapeHtml(bottom)}</span><span><b>위생화</b> ${escapeHtml(shoe)}</span>`;
  }
  head.appendChild(sizesWrap);

  const actions = document.createElement('div');
  actions.className = 'acc-actions';

  if(editingSizesEmpId === emp.id){
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-teal';
    saveBtn.textContent = '저장';
    saveBtn.onclick = ()=> saveSizes(emp.id);
    actions.appendChild(saveBtn);

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn-gray';
    cancelBtn.textContent = '취소';
    cancelBtn.onclick = ()=> { editingSizesEmpId = null; render(); };
    actions.appendChild(cancelBtn);
  } else {
    const editBtn = document.createElement('button');
    editBtn.className = 'btn-gray';
    editBtn.textContent = '사이즈 수정';
    editBtn.onclick = ()=> { editingSizesEmpId = emp.id; render(); };
    actions.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-danger';
    delBtn.textContent = '이 직원 삭제';
    delBtn.onclick = ()=> deleteEmployee(emp.id);
    actions.appendChild(delBtn);
  }
  head.appendChild(actions);
  inner.appendChild(head);

  /* ---- 하단: 품목별 이력 ---- */
  const itemsWrap = document.createElement('div');
  itemsWrap.className = 'acc-items';

  ITEMS.forEach(item=>{
    const block = document.createElement('div');
    block.className = 'acc-item-block';

    const h5 = document.createElement('h5');
    const titleSpan = document.createElement('span');
    titleSpan.textContent = item;
    h5.appendChild(titleSpan);

    const sizes = getSizes(emp);
    const badgeWrap = document.createElement('span');
    if(item === '위생복' && (sizes.상의 || sizes.하의)){
      if(sizes.상의){
        const b1 = document.createElement('span');
        b1.className = 'size-badge';
        b1.textContent = '상 ' + sizes.상의;
        badgeWrap.appendChild(b1);
      }
      if(sizes.하의){
        const b2 = document.createElement('span');
        b2.className = 'size-badge';
        b2.textContent = '하 ' + sizes.하의;
        badgeWrap.appendChild(b2);
      }
    } else if(item === '위생화' && sizes.위생화){
      const badge = document.createElement('span');
      badge.className = 'size-badge';
      badge.textContent = sizes.위생화;
      badgeWrap.appendChild(badge);
    }
    h5.appendChild(badgeWrap);
    block.appendChild(h5);

    const records = getRecords(emp.id, item);
    if(records.length === 0){
      const p = document.createElement('div');
      p.className = 'none';
      p.textContent = '지급 이력 없음';
      block.appendChild(p);
    } else {
      const ul = document.createElement('ul');
      records.slice().reverse().forEach(raw=>{
        const li = document.createElement('li');
        li.textContent = formatDisplayDate(raw);
        ul.appendChild(li);
      });
      block.appendChild(ul);
    }
    itemsWrap.appendChild(block);
  });

  inner.appendChild(itemsWrap);
  td.appendChild(inner);
  tr.appendChild(td);
  return tr;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch=>({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function toggleAccordion(empId){
  editingSizesEmpId = null;
  expandedEmpId = (expandedEmpId === empId) ? null : empId;
  render();
}

function saveSizes(empId){
  const emp = appData.employees.find(e=> e.id === empId);
  if(!emp) return;
  const top = readSizeSelector('editTopSize','editTopSizeCustom');
  const bottom = readSizeSelector('editBottomSize','editBottomSizeCustom');
  const shoe = document.getElementById('editShoeSize').value.trim();
  emp.sizes = { 상의: top, 하의: bottom, 위생화: shoe };
  editingSizesEmpId = null;
  render();
  saveData();
}

function deleteEmployee(empId){
  const emp = appData.employees.find(e=> e.id === empId);
  if(!emp) return;
  if(!confirm(`"${emp.name}" 직원을 삭제하시겠습니까?\n해당 직원의 모든 지급 이력이 함께 삭제됩니다.`)) return;

  appData.employees = appData.employees.filter(e=> e.id !== empId);
  delete appData.records[empId];
  if(expandedEmpId === empId) expandedEmpId = null;

  render();
  saveData();
}

function getRecords(empId, item){
  if(!appData.records[empId]) return [];
  if(!appData.records[empId][item]) return [];
  return appData.records[empId][item].slice().sort();
}

/* =========================================================
   날짜 입력 포맷 (6자리 숫자 -> 00.00.00)
   ========================================================= */
function formatDateInput(inputEl){
  let v = inputEl.value.replace(/[^0-9]/g,'');
  if(v.length > 6) v = v.slice(0,6);
  inputEl.value = v;
}

function formatDisplayDate(raw){
  // raw: 6자리 숫자 문자열 YYMMDD
  if(!raw || raw.length !== 6) return raw || '';
  return raw.slice(0,2) + '.' + raw.slice(2,4) + '.' + raw.slice(4,6);
}

function isValidDate6(raw){
  if(!/^\d{6}$/.test(raw)) return false;
  const mm = parseInt(raw.slice(2,4),10);
  const dd = parseInt(raw.slice(4,6),10);
  return mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31;
}

/* =========================================================
   신규 직원 등록 / 삭제
   ========================================================= */
function openAddEmployeeModal(){
  document.getElementById('newEmpName').value = '';
  document.getElementById('newEmpTopSizeWrap').innerHTML = sizeSelectorHtml('newEmpTopSize','newEmpTopSizeCustom','');
  document.getElementById('newEmpBottomSizeWrap').innerHTML = sizeSelectorHtml('newEmpBottomSize','newEmpBottomSizeCustom','');
  document.getElementById('newEmpShoeSizeWrap').innerHTML = numberSizeInputHtml('newEmpShoeSize','');
  document.getElementById('addEmpOverlay').classList.add('show');
}

function addEmployee(){
  const nameInput = document.getElementById('newEmpName');
  const name = nameInput.value.trim();
  if(!name){ alert('직원 성명을 입력해주세요.'); return; }

  const top = readSizeSelector('newEmpTopSize','newEmpTopSizeCustom');
  const bottom = readSizeSelector('newEmpBottomSize','newEmpBottomSizeCustom');
  const shoe = document.getElementById('newEmpShoeSize').value.trim();

  const id = 'emp_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
  appData.employees.push({ id, name, sizes: { 상의: top, 하의: bottom, 위생화: shoe } });
  appData.records[id] = {};

  closeModal('addEmpOverlay');
  render();
  saveData();
}

/* =========================================================
   품목별 지급 등록 / 이력 모달
   ========================================================= */
function openItemModal(empId, item){
  currentItemCtx = { empId, item };
  const emp = appData.employees.find(e=> e.id === empId);
  document.getElementById('itemModalTitle').textContent = `${emp ? emp.name : ''} · ${item}`;
  document.getElementById('newDateInput').value = '';
  renderHistoryList();
  document.getElementById('itemOverlay').classList.add('show');
}

function renderHistoryList(){
  const ul = document.getElementById('historyList');
  ul.innerHTML = '';
  if(!currentItemCtx) return;
  const records = getRecords(currentItemCtx.empId, currentItemCtx.item);

  if(records.length === 0){
    ul.innerHTML = '<li class="none">지급 이력이 없습니다.</li>';
    return;
  }

  records.slice().reverse().forEach(raw=>{
    const li = document.createElement('li');
    const dateSpan = document.createElement('span');
    dateSpan.textContent = formatDisplayDate(raw);
    const delSpan = document.createElement('span');
    delSpan.className = 'del-record';
    delSpan.textContent = '삭제';
    delSpan.onclick = ()=> deleteRecord(raw);
    li.appendChild(dateSpan);
    li.appendChild(delSpan);
    ul.appendChild(li);
  });
}

function addRecord(){
  if(!currentItemCtx) return;
  const input = document.getElementById('newDateInput');
  const raw = input.value.trim();

  if(!isValidDate6(raw)){
    alert('날짜는 6자리 숫자(YYMMDD)로 입력해주세요. 예: 260713');
    return;
  }

  const { empId, item } = currentItemCtx;
  if(!appData.records[empId]) appData.records[empId] = {};
  if(!appData.records[empId][item]) appData.records[empId][item] = [];
  appData.records[empId][item].push(raw);

  input.value = '';
  renderHistoryList();
  render();
  saveData();
}

function deleteRecord(raw){
  if(!currentItemCtx) return;
  const { empId, item } = currentItemCtx;
  if(!confirm(`${formatDisplayDate(raw)} 지급 기록을 삭제하시겠습니까?`)) return;

  appData.records[empId][item] = (appData.records[empId][item] || []).filter(d=> d !== raw);

  renderHistoryList();
  render();
  saveData();
}

/* =========================================================
   공통 유틸
   ========================================================= */
function closeModal(id){
  document.getElementById(id).classList.remove('show');
  if(id === 'itemOverlay') currentItemCtx = null;
}

document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click', (e)=>{
    if(e.target === ov) closeModal(ov.id);
  });
});

/* =========================================================
   시작
   ========================================================= */
initFirebase();
loadData();
</script>
</body>
</html>
