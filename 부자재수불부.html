<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부자재수불부</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--primary:#1a5fa8;--primary-light:#e8f0fb;--primary-dark:#0d3f75;--success:#1e9e6e;--success-light:#e6f5ef;--warning:#e07b1a;--warning-light:#fdf0e0;--danger:#d63031;--danger-light:#fff0f0;--border:#e0e4ea;--bg:#f4f6fa;--text:#1a1d23;--text2:#5a6070;--text3:#9aa0ad;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);}
.topbar{background:var(--primary-dark);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{color:#fff;font-size:16px;font-weight:700;}
.topbar-back{color:rgba(255,255,255,0.8);background:none;border:none;font-size:13px;cursor:pointer;}
.content{padding:20px;max-width:1400px;margin:0 auto;}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:15px;font-weight:700;}
.card-bd{padding:20px;}
.filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.search-input{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:"Noto Sans KR",sans-serif;outline:none;min-width:160px;}
.search-input:focus{border-color:var(--primary);}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;cursor:pointer;font-family:"Noto Sans KR",sans-serif;font-weight:600;padding:8px 16px;font-size:13px;transition:all 0.15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fcc;}
.btn-sm{padding:5px 10px;font-size:12px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.stat-value{font-size:26px;font-weight:700;}
.stat-blue{color:var(--primary);}
.stat-green{color:var(--success);}
.stat-red{color:var(--danger);}
.table-wrap{overflow-x:auto;}
table{width:100%;min-width:600px;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg);}
th{padding:10px 12px;text-align:left;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:var(--primary-light);color:var(--primary);}
.badge-green{background:var(--success-light);color:var(--success);}
.badge-gray{background:#f0f0f0;color:#666;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);}
.modal-bd{padding:24px;}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.form-row{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:"Noto Sans KR",sans-serif;outline:none;width:100%;}
.form-input:focus{border-color:var(--primary);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fl-tab{padding:8px;border:none;border-radius:7px;font-family:"Noto Sans KR",sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.15s;}
.fl-tab.active{background:var(--primary);color:#fff;}
.fl-panel{display:none;}
.fl-panel.active{display:block;}
.tc{text-align:center;}</style>
</head>

  <button class="topbar-back" onclick="location.href='통합관리.html'">← 통합관리</button>
  <div class="topbar-title">🏷 부자재수불부</div>

          <thead><tr><th>코드</th><th>품목명</th><th>거래처</th><th>규격</th><th>단위</th><th>전일재고</th><th>입고</th><th>출고</th><th>마감재고</th><th>관리</th></tr></thead>

<script>

function getTodayISO2(){ return new Date().toISOString().slice(0,10); }
function getToday(){ const d=new Date(); return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일'; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e,id){ if(e.target.id===id) closeModal(id); }
function closeAllModals(){ document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open')); }

// ===== 부자재수불부 =====
const SUB_CATEGORIES=['필름포장지','벌크비닐','박스','패키지박스'];
const SUB_CAT_ICONS={'필름포장지':'🎞️','벌크비닐':'🗂️','박스':'📦','패키지박스':'🎁'};
let SUB_ITEM_DB=[];
let subLedgerRecords=[];

function initSubLedger(){
  SUB_ITEM_DB=JSON.parse(localStorage.getItem('subItemDB')||'[]');
  subLedgerRecords=JSON.parse(localStorage.getItem('subLedgerRecords')||'[]');
  try{
    const subRecs=JSON.parse(localStorage.getItem('subIncomingRecords')||'[]');
    subRecs.forEach(rec=>{
      (rec.rows||[]).forEach(row=>{
        if(!row.item||!row.qty) return;
        const lot=row.lot||'';
        const exists=subLedgerRecords.find(r=>r.lot===lot&&r.name===row.item&&r.type==='in');
        if(!exists){
          const isoDate=rec.date||getTodayISO2();
          subLedgerRecords.push({date:isoDate,name:row.item,code:row.lot||'',qty:parseFloat(row.qty)||0,mfg:row.mfg||'',lot,supplier:row.supplier||'',type:'in'});
        }
      });
    });
    localStorage.setItem('subLedgerRecords',JSON.stringify(subLedgerRecords));
  }catch(e){}
  subLedgerRecords.forEach(r=>{
    if(r.name&&!SUB_ITEM_DB.find(i=>i.name===r.name)){
      const cat=Object.keys({'필름포장지':'필름포장지','벌크비닐':'벌크비닐','박스':'박스','패키지박스':'패키지박스'}).find(k=>r.name.includes(k))||'박스';
      SUB_ITEM_DB.push({code:r.code||autoSubCode(cat),name:r.name,category:cat,spec:'',unit:'EA',supplier:r.supplier||''});
    }
  });
  localStorage.setItem('subItemDB',JSON.stringify(SUB_ITEM_DB));
}

function autoSubCode(category){
  const prefixMap={'필름포장지':'F','벌크비닐':'G','박스':'H','패키지박스':'P'};
  const prefix=prefixMap[category]||'Z';
  const nums=SUB_ITEM_DB.filter(i=>i.category===category).map(i=>parseInt((i.code||'').replace(prefix,''))||0);
  const next=(nums.length?Math.max(...nums):0)+1;
  return prefix+String(next).padStart(3,'0');
}

function calcSubLedgerRow(item,monthStart,selDate){
  const prevIn=subLedgerRecords.filter(r=>r.name===item.name&&(r.type==='in'||r.type==='init')&&r.date<monthStart).reduce((s,r)=>s+r.qty,0);
  const prevOut=subLedgerRecords.filter(r=>r.name===item.name&&r.type==='out'&&r.date<monthStart).reduce((s,r)=>s+r.qty,0);
  const prevStock=Math.max(0,prevIn-prevOut);
  const monthIn=subLedgerRecords.filter(r=>r.name===item.name&&(r.type==='in'||r.type==='init')&&r.date>=monthStart&&r.date<=selDate).reduce((s,r)=>s+r.qty,0);
  const monthOut=subLedgerRecords.filter(r=>r.name===item.name&&r.type==='out'&&r.date>=monthStart&&r.date<=selDate).reduce((s,r)=>s+r.qty,0);
  const closing=Math.max(0,prevStock+monthIn-monthOut);
  return {prevStock,monthIn,monthOut,closing};
}

function renderSubLedger(){
  const selDate=document.getElementById('subLedgerDate').value||getTodayISO2();
  const q=(document.getElementById('subLedgerSearch')?.value||'').trim().toLowerCase();
  const catFilter=document.getElementById('subLedgerCategory')?.value||'';
  const el=document.getElementById('subLedgerDate-display');
  if(el) el.textContent=selDate;
  const[sy,sm]=selDate.split('-').map(Number);
  const monthStart=`${sy}-${String(sm).padStart(2,'0')}-01`;
  const tbody=document.getElementById('subLedgerTbody');
  const cats=catFilter?[catFilter]:SUB_CATEGORIES;
  let html='';let totalItems=0;
  cats.forEach(cat=>{
    let items=SUB_ITEM_DB.filter(i=>i.category===cat&&(!q||i.name.toLowerCase().includes(q)||i.code.toLowerCase().includes(q)));
    if(!items.length) return;
    totalItems+=items.length;
    html+=`<tr><td colspan="10" style="background:#eef2f8;padding:8px 12px;font-size:12px;font-weight:700;color:var(--primary-dark);border-bottom:2px solid var(--border);">${SUB_CAT_ICONS[cat]||'📦'} ${cat}</td></tr>`;
    html+=items.map(item=>{
      const{prevStock,monthIn,monthOut,closing}=calcSubLedgerRow(item,monthStart,selDate);
      return `<tr><td><span class="badge badge-blue" style="font-size:10px">${item.code}</span></td><td style="font-weight:600">${item.name}</td><td style="font-size:12px;color:var(--text2)">${item.supplier||'-'}</td><td style="font-size:12px;color:var(--text2)">${item.spec||'-'}</td><td class="tc" style="font-size:12px">${item.unit||'EA'}</td><td class="tc" style="color:var(--text2)">${prevStock>0?prevStock:'-'}</td><td class="tc" style="color:var(--success);font-weight:${monthIn>0?700:400}">${monthIn>0?'+'+monthIn:'-'}</td><td class="tc" style="color:var(--danger);font-weight:${monthOut>0?700:400}">${monthOut>0?'-'+monthOut:'-'}</td><td class="tc" style="font-weight:700;color:${closing>0?'var(--primary)':'var(--text3)'}">${closing}</td><td style="white-space:nowrap;"><button class="btn btn-sm btn-primary" onclick="openSubLedgerRecord('${item.name}','${item.code}')">+ 등록</button><button class="btn btn-sm btn-danger" onclick="deleteSubItem('${item.code}')">삭제</button></td></tr>`;
    }).join('');
  });
  if(!totalItems) html='<tr><td colspan="10" class="tc" style="padding:24px;color:var(--text3)">등록된 부자재가 없습니다</td></tr>';
  if(tbody) tbody.innerHTML=html;
}

function openSubLedgerRecord(name,code){
  closeAllModals();
  document.getElementById('slrName').value=name;
  document.getElementById('slrCode').value=code;
  document.getElementById('slrType').value='in';
  document.getElementById('slrQty').value='';
  document.getElementById('slrDate').value=getTodayISO2();
  document.getElementById('slrMfg').value='';
  document.getElementById('slrNote').value='';
  document.getElementById('subLedgerRecordTitle').textContent=`수불 등록 - ${name}`;
  document.getElementById('subLedgerRecordModal').classList.add('open');
}
function saveSubLedgerRecord(){
  const name=document.getElementById('slrName').value;
  const code=document.getElementById('slrCode').value;
  const type=document.getElementById('slrType').value;
  const qty=parseInt(document.getElementById('slrQty').value)||0;
  const date=document.getElementById('slrDate').value;
  const mfg=document.getElementById('slrMfg').value;
  const note=document.getElementById('slrNote').value.trim();
  if(!qty){alert('수량을 입력해주세요');return;}
  subLedgerRecords.push({date,name,code,qty,mfg,note,type});
  localStorage.setItem('subLedgerRecords',JSON.stringify(subLedgerRecords));
  closeModal('subLedgerRecordModal');renderSubLedger();
}
function deleteSubItem(code){
  if(!confirm('해당 품목과 수불 기록을 모두 삭제하시겠습니까?'))return;
  const item=SUB_ITEM_DB.find(i=>i.code===code);
  if(item){subLedgerRecords=subLedgerRecords.filter(r=>r.name!==item.name);localStorage.setItem('subLedgerRecords',JSON.stringify(subLedgerRecords));}
  SUB_ITEM_DB=SUB_ITEM_DB.filter(i=>i.code!==code);
  localStorage.setItem('subItemDB',JSON.stringify(SUB_ITEM_DB));
  renderSubLedger();
}
function openNewSubItemModal(){
  closeAllModals();
  document.getElementById('nsiCategory').value='필름포장지';
  document.getElementById('nsiName').value='';
  document.getElementById('nsiSpec').value='';
  document.getElementById('nsiUnit').value='EA';
  document.getElementById('nsiSupplier').value='';
  updateNsiCode();
  document.getElementById('newSubItemModal').classList.add('open');
}
function updateNsiCode(){
  const cat=document.getElementById('nsiCategory').value;
  document.getElementById('nsiCode').value=autoSubCode(cat);
}
function saveNewSubItem(){
  const category=document.getElementById('nsiCategory').value;
  const code=document.getElementById('nsiCode').value;
  const name=document.getElementById('nsiName').value.trim();
  const spec=document.getElementById('nsiSpec').value.trim();
  const unit=document.getElementById('nsiUnit').value;
  const supplier=document.getElementById('nsiSupplier').value.trim();
  if(!name){alert('품목명을 입력해주세요');return;}
  if(SUB_ITEM_DB.find(i=>i.name===name)){alert('이미 등록된 품목명입니다');return;}
  SUB_ITEM_DB.push({code,name,category,spec,unit,supplier});
  localStorage.setItem('subItemDB',JSON.stringify(SUB_ITEM_DB));
  closeModal('newSubItemModal');renderSubLedger();
}
function openSubInitStock(){
  closeAllModals();
  const sel=document.getElementById('siItem');
  sel.innerHTML='<option value="">-- 품목 선택 --</option>'+SUB_ITEM_DB.map(i=>`<option value="${i.name}">[${i.code}] ${i.name}</option>`).join('');
  document.getElementById('subInitStockTbody').innerHTML='';
  document.getElementById('subInitStockModal').classList.add('open');
}
function addSubInitRow(){
  const name=document.getElementById('siItem').value;
  const qty=parseInt(document.getElementById('siQty').value)||0;
  const mfg=document.getElementById('siMfg').value;
  const date=document.getElementById('siDate').value||getTodayISO2();
  if(!name||!qty){alert('품목과 재고량을 입력해주세요');return;}
  const item=SUB_ITEM_DB.find(i=>i.name===name);
  subInitRows.push({date,name,code:item?item.code:'',qty,mfg,type:'init'});
  renderSubInitRows();
}
let subInitRows=[];
function renderSubInitRows(){
  document.getElementById('subInitStockTbody').innerHTML=subInitRows.map((r,i)=>`<tr><td><span class="badge badge-blue" style="font-size:10px">${r.code}</span></td><td style="font-weight:600">${r.name}</td><td class="tc">${r.qty}</td><td class="tc">${r.mfg||'-'}</td><td class="tc">${r.date}</td><td><button class="btn btn-sm btn-danger" onclick="removeSubInitRow(${i})">삭제</button></td></tr>`).join('');
}
function removeSubInitRow(i){subInitRows.splice(i,1);renderSubInitRows();}
function saveSubInitStock(){
  if(!subInitRows.length){alert('등록할 재고가 없습니다');return;}
  subLedgerRecords=subLedgerRecords.filter(r=>r.type!=='init');
  subInitRows.forEach(r=>subLedgerRecords.push(r));
  localStorage.setItem('subLedgerRecords',JSON.stringify(subLedgerRecords));
  closeModal('subInitStockModal');renderSubLedger();
}
function printSubLedger(){
  const selDate=document.getElementById('subLedgerDate').value||getTodayISO2();
  const[sy,sm]=selDate.split('-').map(Number);
  const monthStart=`${sy}-${String(sm).padStart(2,'0')}-01`;
  let bodyHtml='';
  SUB_CATEGORIES.forEach(cat=>{
    const items=SUB_ITEM_DB.filter(i=>i.category===cat);
    if(!items.length) return;
    bodyHtml+=`<tr><td colspan="9" class="cat-header">${cat}</td></tr>`;
    bodyHtml+=items.map(item=>{
      const{prevStock,monthIn,monthOut,closing}=calcSubLedgerRow(item,monthStart,selDate);
      return `<tr><td><span class="badge">${item.code}</span></td><td class="left bold">${item.name}</td><td class="left">${item.supplier||'-'}</td><td class="left">${item.spec||'-'}</td><td>${item.unit||'EA'}</td><td>${prevStock>0?prevStock:'-'}</td><td>${monthIn>0?'+'+monthIn:'-'}</td><td>${monthOut>0?'-'+monthOut:'-'}</td><td class="bold">${closing}</td></tr>`;
    }).join('');
  });
  const printWin=window.open('','_blank');
  printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>부자재수불부 ${selDate}</title><style>body{font-family:"Noto Sans KR",sans-serif;font-size:10px;padding:20px;}h2{font-size:16px;margin-bottom:4px;}.sub{font-size:12px;color:#666;margin-bottom:14px;}table{width:100%;border-collapse:collapse;}th{background:#f0f0f0;border:1px solid #999;padding:5px;text-align:center;font-weight:700;}td{border:1px solid #999;padding:5px;text-align:center;}td.left{text-align:left;}td.bold{font-weight:700;}td.cat-header{background:#dde4f0;font-size:11px;font-weight:700;text-align:left;padding:6px 10px;color:#0d3f75;}.badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:9px;font-weight:700;background:#e8f0fb;color:#1a5fa8;}@page{margin:10mm;size:A4 landscape;}</style></head><body><h2>부자재수불부</h2><div class="sub">조회일자: ${selDate} / 출력일시: ${new Date().toLocaleString('ko-KR')}</div><table><thead><tr><th>코드</th><th>품목명</th><th>거래처</th><th>규격</th><th>단위</th><th>전일재고</th><th>입고</th><th>출고</th><th>마감재고</th></tr></thead><tbody>${bodyHtml}</tbody></table></body></html>`);
  printWin.document.close();
  setTimeout(()=>printWin.print(),500);
}
